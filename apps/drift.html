<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drift Mix Center | Commander Q</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple: #bc13fe;
            --cyan: #05ffa1;
            --glass: rgba(255, 255, 255, 0.08);
            --apple-blur: blur(20px);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #030008;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- NEON STARS & SPEED LINES --- */
        .vfx-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a001a 0%, #030008 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .speed-line {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--cyan));
            opacity: 0.3;
            animation: moveLine 0.5s linear infinite;
        }

        @keyframes moveLine {
            0% { transform: translateY(-110vh) rotate(15deg); }
            100% { transform: translateY(110vh) rotate(15deg); }
        }

        /* --- UI CONTAINER --- */
        .scanlines {
            position: fixed; top: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 100;
        }

        .drift-interface {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .player-window {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: var(--apple-blur);
            -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: clamp(1rem, 4vw, 2rem);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Glitch Animation for switching videos */
        .glitch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cyan);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .glitching { animation: glitchFlash 0.3s ease-out; }
        @keyframes glitchFlash {
            0% { opacity: 0; }
            20% { opacity: 0.4; transform: skewX(20deg); }
            40% { opacity: 0.2; transform: skewX(-20deg); }
            100% { opacity: 0; }
        }

        /* --- MIX CONTROLS --- */
        .mix-controls {
            margin-top: 25px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .session-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--purple);
            color: #fff;
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .session-btn:hover, .session-btn.active {
            background: var(--purple);
            box-shadow: 0 0 15px var(--purple);
            transform: translateY(-2px);
        }

        /* --- FOOTER --- */
        .vanguard-footer { padding: 25px; text-align: center; }
        .footer-content { font-size: 0.7rem; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
        .pulse { animation: pulseWhite 2s infinite ease-in-out; }
        @keyframes pulseWhite { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; text-shadow: 0 0 10px #fff; } }

    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vfx-layer" id="vfx-bg"></div>

    <main class="drift-interface">
        <div class="player-window">
            <header style="margin-bottom: 15px;">
                <p style="font-size: 0.6rem; color: var(--cyan); letter-spacing: 3px;">// DRIFT_MIX_SESSION</p>
                <h2 id="video-title" style="font-size: 1.2rem; font-weight: 900;">LOADING SESSION...</h2>
            </header>

            <div class="video-wrapper">
                <div id="glitch" class="glitch-overlay"></div>
                <iframe id="main-player" src="" allowfullscreen></iframe>
            </div>

            <div id="session-grid" class="mix-controls">
                </div>
        </div>
    </main>

    <footer class="vanguard-footer">
        <div id="footer-text" class="footer-content pulse">Built by Commander Q 2026</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = document.getElementById('main-player');
            const titleDisplay = document.getElementById('video-title');
            const sessionGrid = document.getElementById('session-grid');
            const glitch = document.getElementById('glitch');
            const bg = document.getElementById('vfx-bg');

            // --- 1. GENERATE VFX (Stars & Lines) ---
            for(let i=0; i<50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = Math.random() * 3 + 'px';
                star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                bg.appendChild(star);
            }

            for(let i=0; i<15; i++) {
                const line = document.createElement('div');
                line.className = 'speed-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.animationDelay = Math.random() * 2 + 's';
                bg.appendChild(line);
            }

            // --- 2. DATA LOAD ---
            // Note: Path is ../ because we are in the /apps folder
            fetch('../database/drift.json')
                .then(res => res.json())
                .then(data => {
                    renderSessions(data.sessions);
                    loadVideo(data.sessions[0]); // Load first mix
                })
                .catch(err => console.error("Signal Lost: Cannot reach drift.json", err));

            function renderSessions(sessions) {
                sessionGrid.innerHTML = sessions.map((s, index) => `
                    <button class="session-btn" onclick="switchVideo('${s.id}', '${s.title}', this)">
                        SESSION_${index + 1}
                    </button>
                `).join('');
            }

            window.switchVideo = (id, title, btn) => {
                // Remove active state from others
                document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Trigger Glitch Effect
                glitch.classList.add('glitching');
                setTimeout(() => glitch.classList.remove('glitching'), 300);

                loadVideo({id, title});
            };

            function loadVideo(video) {
                player.src = `https://www.youtube.com/embed/${video.id}?autoplay=1&mute=0&rel=0`;
                titleDisplay.innerText = video.title;
            }

            // --- 3. FOOTER ROTATION ---
            const footerText = document.getElementById('footer-text');
            let showMission = false;
            setInterval(() => {
                footerText.style.opacity = 0;
                setTimeout(() => {
                    footerText.innerText = showMission ? "Built by Commander Q 2026" : "Empower. Educate. Elevate.";
                    footerText.style.opacity = 1;
                    showMission = !showMission;
                }, 500);
            }, 3000);
        });
    </script>
</body>
</html>
