<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drift Hub | Commander Q</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple: #bc13fe;
            --cyan: #05ffa1;
            --glass: rgba(255, 255, 255, 0.08);
            --apple-blur: blur(20px);
        }

        /* --- SYSTEM RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #030008;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            /* Use dvh to account for mobile browser UI */
            height: 100dvh; 
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- VFX BACKGROUND --- */
        .vfx-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #0a001a 0%, #030008 100%);
            overflow: hidden;
        }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite ease-in-out; }
        .speed-line {
            position: absolute; width: 2px; height: 120px;
            background: linear-gradient(to bottom, transparent, var(--cyan));
            opacity: 0.2; animation: moveLine 0.6s linear infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes moveLine { 0% { transform: translateY(-110vh) rotate(15deg); } 100% { transform: translateY(110vh) rotate(15deg); } }

        /* --- TOP NAVIGATION (FIXED) --- */
        .top-nav { 
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 15px 20px; z-index: 110; 
        }
        .back-btn {
            display: inline-flex; align-items: center; text-decoration: none; color: var(--cyan);
            font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid var(--cyan); padding: 10px 18px; border-radius: 4px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

        /* --- THE MIDDLE WINDOW PROTOCOL --- */
        .interface-container {
            flex: 1; 
            width: 100%;
            display: flex; 
            align-items: center; /* Vertical Center */
            justify-content: center; /* Horizontal Center */
            padding: 20px;
            z-index: 10;
        }

        .glass-window {
            width: 100%;
            max-width: 1200px;
            max-height: 90vh; /* Prevents overflow on very small screens */
            background: var(--glass);
            backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            padding: clamp(15px, 5vw, 30px);
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-wrapper {
            position: relative; width: 100%; max-width: 650px;
            aspect-ratio: 16 / 9; background: #000; border-radius: 8px;
            overflow: hidden; margin: 0 auto 15px; border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0; /* Keeps player size stable */
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- PAGING SYSTEM --- */
        .carousel-nexus {
            display: flex; align-items: center; gap: 5px; width: 100%;
        }
        .nav-arrow {
            background: none; border: none; color: var(--cyan);
            font-size: 1.8rem; cursor: pointer; padding: 5px;
            transition: 0.3s; animation: arrowPulse 2s infinite;
        }
        @keyframes arrowPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .session-carousel {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 10px; width: 100%; scrollbar-width: none;
        }
        .session-carousel::-webkit-scrollbar { display: none; }

        .session-page {
            flex: 0 0 100%; 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(2, 1fr); 
            gap: 10px; scroll-snap-align: start;
        }

        @media (min-width: 1024px) {
            .session-page {
                flex: 0 0 auto; grid-template-columns: repeat(6, 1fr);
                grid-template-rows: none; width: 100%;
            }
            .nav-arrow { display: none; }
        }

        .session-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--purple);
            color: #fff; padding: 12px; font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem; cursor: pointer; border-radius: 4px; transition: 0.3s;
            text-transform: uppercase;
        }
        .session-btn.active { background: var(--purple); box-shadow: 0 0 10px var(--purple); }

        /* --- INTEGRATED FOOTER --- */
        .vanguard-footer { 
            margin-top: 15px; text-align: center; flex-shrink: 0;
        }
        .footer-content { font-size: 0.55rem; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
        .pulse { animation: pulseWhite 2s infinite ease-in-out; }
        @keyframes pulseWhite { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .glitch-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--cyan); opacity: 0; pointer-events: none; z-index: 5; }
        .active-glitch { animation: glitchEffect 0.2s ease-out; }
        @keyframes glitchEffect { 0% { opacity: 0; } 50% { opacity: 0.3; } 100% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="vfx-layer" id="vfx-bg"></div>

    <nav class="top-nav">
        <a href="../menu.html" class="back-btn"> &LT; RETURN </a>
    </nav>

    <main class="interface-container">
        <div class="glass-window">
            <header style="margin-bottom: 10px;">
                <p style="font-size: 0.5rem; color: var(--cyan); letter-spacing: 2px;">// DRIFT_HUB_NEURAL_LINK</p>
                <h2 id="video-title" style="font-size: 0.85rem; font-weight: 900; text-transform: uppercase;">LOADING...</h2>
            </header>

            <div class="player-wrapper">
                <div id="glitch" class="glitch-flash"></div>
                <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="carousel-nexus">
                <button class="nav-arrow" id="prev-btn">&lt;</button>
                <div id="session-carousel" class="session-carousel"></div>
                <button class="nav-arrow" id="next-btn">&gt;</button>
            </div>

            <footer class="vanguard-footer">
                <div id="footer-text" class="footer-content pulse">Built by Commander Q 2026</div>
            </footer>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = document.getElementById('main-player');
            const titleDisplay = document.getElementById('video-title');
            const carousel = document.getElementById('session-carousel');
            const glitch = document.getElementById('glitch');
            const bg = document.getElementById('vfx-bg');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            // --- VFX ---
            for(let i=0; i<30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = Math.random() * 2 + 'px';
                star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                bg.appendChild(star);
            }

            // --- DATA LOAD ---
            fetch('../database/drift.json')
                .then(res => res.json())
                .then(data => {
                    const sessions = data.sessions;
                    const isMobile = window.innerWidth < 1024;
                    
                    if (isMobile) {
                        for (let i = 0; i < sessions.length; i += 4) {
                            const pageDiv = document.createElement('div');
                            pageDiv.className = 'session-page';
                            pageDiv.innerHTML = sessions.slice(i, i + 4).map((s, idx) => `
                                <button class="session-btn" onclick="switchSession('${s.id}', '${s.title}', this)">
                                    SESS_${(i + idx + 1).toString().padStart(2, '0')}
                                </button>
                            `).join('');
                            carousel.appendChild(pageDiv);
                        }
                    } else {
                        const pageDiv = document.createElement('div');
                        pageDiv.className = 'session-page';
                        pageDiv.innerHTML = sessions.map((s, idx) => `
                            <button class="session-btn" onclick="switchSession('${s.id}', '${s.title}', this)">
                                SESS_${(idx + 1).toString().padStart(2, '0')}
                            </button>
                        `).join('');
                        carousel.appendChild(pageDiv);
                    }

                    if(sessions.length > 0) {
                        loadVideo(sessions[0]);
                        const firstBtn = document.querySelector('.session-btn');
                        if(firstBtn) firstBtn.classList.add('active');
                    }
                });

            nextBtn.addEventListener('click', () => carousel.scrollBy({ left: carousel.clientWidth, behavior: 'smooth' }));
            prevBtn.addEventListener('click', () => carousel.scrollBy({ left: -carousel.clientWidth, behavior: 'smooth' }));

            window.switchSession = (id, title, btn) => {
                document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                glitch.classList.add('active-glitch');
                setTimeout(() => glitch.classList.remove('active-glitch'), 200);
                loadVideo({id, title});
            };

            function loadVideo(video) {
                player.src = `https://www.youtube.com/embed/${video.id}?autoplay=1&mute=0&rel=0`;
                titleDisplay.innerText = video.title;
            }

            const ft = document.getElementById('footer-text');
            let showM = false;
            setInterval(() => {
                ft.style.opacity = 0;
                setTimeout(() => {
                    ft.innerText = showM ? "Built by Commander Q 2026" : "Empower. Educate. Elevate.";
                    ft.style.opacity = 1; showM = !showM;
                }, 500);
            }, 3000);
        });
    </script>
</body>
</html>
