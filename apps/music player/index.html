<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Retrowave Player</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

  <div class="main-window glass">
    
    <header class="app-header">
      <a href="../../menu.html" class="back-btn">
        <svg viewBox="0 0 24 24" class="icon-sm"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> 
        Back to Menu
      </a>
    </header>

    <div class="video-section">
      <div class="pulse-wrapper">
        <div id="player"></div> 
      </div>
    </div>

    <div class="controls-section glass-inset">
      <button id="prev-btn" class="ctrl-btn" title="Previous Track">
        <svg viewBox="0 0 24 24" class="icon"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      
      <button id="play-btn" class="ctrl-btn main-ctrl" title="Play">
        <svg viewBox="0 0 24 24" class="icon-lg"><path d="M8 5v14l11-7z"/></svg>
      </button>
      
      <button id="pause-btn" class="ctrl-btn main-ctrl" title="Pause" style="display:none;">
        <svg viewBox="0 0 24 24" class="icon-lg"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      
      <button id="next-btn" class="ctrl-btn" title="Next Track">
        <svg viewBox="0 0 24 24" class="icon"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <div class="selector-section">
      <div class="custom-select-wrapper">
        <select id="station-select" class="glass-input">
          <option value="" disabled selected>Select a Station...</option>
        </select>
      </div>
    </div>

    <main id="playlist-container" class="playlist-section">
      <div class="empty-state">Select a station to see playlists</div>
    </main>

  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
