<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower of Tunes | Commander Q</title>
    
    <style>
        :root {
            --purple: #bf5af2;
            --cyan: #05ffa1;
            --glass: rgba(255, 255, 255, 0.08);
            --apple-blur: blur(20px);
            /* Dynamic Theme Color (Changes via JS) */
            --theme-color: #0a84ff; 
        }

        /* --- SYSTEM RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        /* SF Pro Text Enforcement */
        body {
            background: #030008; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
            transition: background 0.8s ease;
        }

        /* --- TOWER DATA STREAM VFX --- */
        .vfx-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #0a001a 0%, #030008 100%); overflow: hidden;
        }
        .data-stream {
            position: absolute; width: 1px; background: linear-gradient(to bottom, transparent, var(--theme-color), transparent);
            opacity: 0.2; animation: streamDrop linear infinite; transition: background 0.5s;
        }
        @keyframes streamDrop { 0% { transform: translateY(-100vh); } 100% { transform: translateY(100vh); } }

        /* --- IMMERSIVE THEATER MODE TRANSITIONS --- */
        .top-nav, .station-tabs, .video-list-nexus, .vanguard-footer, .header-tag {
            transition: opacity 0.8s ease;
        }
        .glass-window {
            transition: background 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease;
        }

        /* When the body has the 'immersive' class (music is playing) */
        body.immersive .top-nav,
        body.immersive .station-tabs,
        body.immersive .video-list-nexus,
        body.immersive .vanguard-footer,
        body.immersive .header-tag {
            opacity: 0.15; /* Dims the UI to 15% visibility */
        }

        body.immersive .glass-window {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255,255,255,0.02);
            box-shadow: 0 20px 80px rgba(0,0,0,0.9);
        }

        body.immersive .now-playing {
            text-shadow: 0 0 20px var(--theme-color);
        }

        /* Tactical Override: UI brightens when touched/hovered */
        body.immersive .station-tabs:hover,
        body.immersive .video-list-nexus:hover,
        body.immersive .media-controls-bar:hover,
        body.immersive .top-nav:hover {
            opacity: 1;
        }

        /* --- TOP NAV --- */
        .top-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px; z-index: 110; }
        .back-btn {
            display: inline-flex; align-items: center; text-decoration: none; color: #fff;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--apple-blur); border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px 18px; border-radius: 8px; transition: 0.3s;
        }
        .back-btn:hover { border-color: var(--theme-color); box-shadow: 0 0 15px var(--theme-color); }

        /* --- NEURAL CENTERING --- */
        .interface-container {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; 
            padding: 15px; z-index: 10;
        }

        .glass-window {
            width: 100%; max-width: 700px; max-height: 95dvh;
            background: var(--glass); backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: clamp(15px, 4vw, 25px); text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        /* --- TYPOGRAPHY --- */
        .header-tag { font-size: 0.6rem; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        .now-playing { 
            font-size: 0.9rem; font-weight: 800; text-transform: uppercase; color: #fff; 
            letter-spacing: 0.5px; margin-bottom: 15px; text-shadow: 0 0 10px var(--theme-color);
            transition: text-shadow 0.8s ease;
        }

        /* --- AURA PLAYER & CONTROLS --- */
        .player-wrapper {
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; 
            border: 2px solid var(--theme-color); flex-shrink: 0;
            animation: dynamicPulse 3s infinite ease-in-out;
            transition: border-color 0.5s ease;
        }
        
        @keyframes dynamicPulse {
            0%, 100% { box-shadow: 0 0 10px var(--theme-color); }
            50% { box-shadow: 0 0 25px var(--theme-color); }
        }

        #yt-player { width: 100%; height: 100%; border: none; }
        
        .touch-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Unified Control Bar */
        .media-controls-bar {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 30px; padding: 10px 25px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0;
            transition: opacity 0.8s ease;
        }

        .ctrl-btn {
            background: none; border: none; color: #fff;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:active { transform: scale(0.8); color: var(--theme-color); }
        .ctrl-btn.play-pause { font-size: 1.8rem; }

        /* --- TABS --- */
        .station-tabs {
            display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; flex-shrink: 0;
            background: rgba(0,0,0,0.3); border-radius: 10px; padding: 5px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; border-radius: 6px;
            color: rgba(255,255,255,0.5); padding: 8px 2px;
            font-size: clamp(0.55rem, 2vw, 0.7rem); font-weight: 600; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: inherit;
        }
        .tab-btn.active { background: var(--theme-color); color: #fff; font-weight: 800; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* --- PLAYLIST NEXUS --- */
        .video-list-nexus {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 450px; flex-shrink: 0;
        }
        .scroll-arrow {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 1rem; cursor: pointer; padding: 2px; transition: 0.3s;
        }
        .scroll-arrow:hover { color: #fff; }

        .list-viewport {
            width: 100%; height: 100px; 
            overflow: hidden; position: relative; margin: 4px 0;
        }
        .session-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            transition: transform 0.4s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .session-btn {
            height: 46px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-family: inherit; cursor: pointer; border-radius: 8px; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 10px;
        }
        .session-btn:hover, .session-btn.active { 
            background: rgba(255,255,255,0.15); border-color: var(--theme-color); 
        }
        .session-btn .pl-title { font-size: 0.65rem; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; text-align: center; }

        /* --- DESKTOP ENHANCEMENTS --- */
        @media (min-width: 1024px) {
            .glass-window { max-width: 900px; padding: 30px; }
            .now-playing { font-size: 1.3rem; margin-bottom: 20px; }
            
            .player-wrapper { 
                max-width: 550px; border-radius: 16px; margin-bottom: 25px; 
            }
            .media-controls-bar {
                position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
                margin-bottom: 0; padding: 12px 35px; background: rgba(0,0,0,0.7);
            }
            .session-grid { grid-template-columns: repeat(3, 1fr); }
            .list-viewport { height: 110px; }
            .session-btn { height: 51px; }
            
            .session-btn .pl-title { font-size: 0.8rem; }
        }

        /* --- FOOTER --- */
        .vanguard-footer { margin-top: 10px; text-align: center; flex-shrink: 0; }
        .footer-content { font-size: 0.5rem; letter-spacing: 2px; color: rgba(255,255,255,0.5); text-transform: uppercase; font-weight: 600; }

        .glitch-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 10; }
        .active-glitch { animation: glitchEffect 0.2s ease-out; }
        @keyframes glitchEffect { 0% { opacity: 0; } 50% { opacity: 0.5; } 100% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="vfx-layer" id="vfx-bg"></div>

    <nav class="top-nav">
        <a href="../menu.html" class="back-btn"> &LT; RETURN </a>
    </nav>

    <main class="interface-container">
        <div class="glass-window">
            
            <header>
                <p class="header-tag">// TOWER_OF_TUNES</p>
                <h2 id="now-playing" class="now-playing">INITIALIZING SIGNAL...</h2>
            </header>

            <div class="player-wrapper">
                <div id="glitch" class="glitch-flash"></div>

                <div class="touch-shield"></div>
                
                <div class="media-controls-bar">
                    <button class="ctrl-btn" id="btn-prev">⏮</button>
                    <button class="ctrl-btn play-pause" id="btn-play">▶</button>
                    <button class="ctrl-btn" id="btn-next">⏭</button>
                </div>
            </div>

            <div class="station-tabs" id="station-tabs"></div>

            <div class="video-list-nexus">
                <button class="scroll-arrow" id="prev-btn">▲</button>
                <div class="list-viewport">
                    <div id="playlist-grid" class="session-grid"></div>
                </div>
                <button class="scroll-arrow" id="next-btn">▼</button>
            </div>

            <footer class="vanguard-footer">
                <div id="footer-text" class="footer-content pulse">Built by Commander Q 2026</div>
            </footer>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
