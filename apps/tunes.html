<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower of Tunes | Commander Q</title>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --apple-blur: blur(25px);
            --theme-color: #0a84ff; 
            --ui-border: rgba(255, 255, 255, 0.1);
        }

        /* --- CORE RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #010103; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
            user-select: none;
        }

        /* --- BACKGROUND --- */
        .vfx-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: #010103;
        }

        /* --- NAVIGATION --- */
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 25px; z-index: 100; }
        .back-link {
            text-decoration: none; color: rgba(255,255,255,0.5); font-size: 0.65rem; 
            font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            padding: 12px 24px; border-radius: 8px; background: var(--glass);
            border: 1px solid var(--ui-border); backdrop-filter: var(--apple-blur);
        }

        /* --- PLAYER ARCHITECTURE --- */
        .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .chassis {
            width: 100%; max-width: 850px; background: var(--glass);
            backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid var(--ui-border); border-radius: 24px;
            padding: clamp(20px, 5vw, 40px); display: flex; flex-direction: column; align-items: center;
        }

        /* --- CLEAN VIDEO FRAME (NO LIGHTNING/GLOW) --- */
        .video-frame {
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--ui-border);
            margin-bottom: 25px;
        }
        #yt-api-frame { width: 100%; height: 100%; border: none; }

        .glitch-flash {
            position: absolute; inset: 0; background: #fff; opacity: 0; z-index: 10; pointer-events: none;
        }
        .trigger-flash { animation: flash 0.15s ease-out; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 0.2; } 100% { opacity: 0; } }

        /* --- DATA READOUT --- */
        .readout { margin-bottom: 25px; text-align: center; }
        .station-tag { font-size: 0.6rem; color: var(--theme-color); letter-spacing: 4px; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; }
        .track-title { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; color: #fff; }

        /* --- CONTROLS --- */
        .controls {
            display: flex; align-items: center; gap: 30px; margin-bottom: 30px;
            background: rgba(255,255,255,0.03); padding: 12px 35px; border-radius: 12px;
            border: 1px solid var(--ui-border);
        }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; transition: 0.2s; }
        .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .btn-play svg { width: 34px; height: 34px; color: var(--theme-color); }

        /* --- SELECTOR SYSTEM --- */
        .station-tabs { display: flex; gap: 8px; width: 100%; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--ui-border); color: rgba(255,255,255,0.4);
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase; cursor: pointer; text-align: center;
        }
        .tab.active { background: var(--theme-color); color: #fff; border-color: transparent; }

        .playlist-scroller { width: 100%; max-width: 550px; }
        .grid-mask { height: 130px; overflow: hidden; margin: 10px 0; }
        .playlist-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .tune-btn {
            height: 60px; background: rgba(255,255,255,0.02); border: 1px solid var(--ui-border);
            border-radius: 8px; color: #fff; padding: 10px; font-size: 0.7rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; text-align: center;
            cursor: pointer; line-height: 1.2;
        }
        .tune-btn.active { border-color: var(--theme-color); background: rgba(255,255,255,0.05); }

        @media (min-width: 1024px) {
            .playlist-grid { grid-template-columns: repeat(3, 1fr); }
            .grid-mask { height: 140px; }
        }

        .scroll-nav { background: none; border: none; color: rgba(255,255,255,0.2); font-size: 1rem; cursor: pointer; width: 100%; padding: 5px; }
    </style>
</head>
<body>

    <div class="vfx-canvas"></div>

    <nav class="top-bar">
        <a href="../menu.html" class="back-link">Return</a>
    </nav>

    <main class="stage">
        <div class="chassis">
            <div class="readout">
                <p id="station-name" class="station-tag">System Ready</p>
                <h2 id="current-track" class="track-title">Select Station</h2>
            </div>

            <div class="video-frame">
                <div id="flash" class="glitch-flash"></div>
                <div id="yt-api-frame"></div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" onclick="yt.previousVideo()">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn btn-play" id="play-trigger">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="yt.nextVideo()">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div class="station-tabs" id="tabs-container"></div>

            <div class="playlist-scroller">
                <button class="scroll-nav" onclick="scrollGrid(-1)">▲</button>
                <div class="grid-mask">
                    <div class="playlist-grid" id="grid-container"></div>
                </div>
                <button class="scroll-nav" onclick="scrollGrid(1)">▼</button>
            </div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, data, activeStation = 0, scrollOffset = 0;
        let lastClick = 0, lastBtn = null;
        const colors = ['#0a84ff', '#ff375f', '#32d74b', '#ffd60a'];

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-api-frame', {
                height: '100%', width: '100%',
                playerVars: { 'controls': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onReady': loadDatabase, 'onStateChange': onStateChange }
            });
        }

        function onStateChange(e) {
            const isPlaying = e.data === YT.PlayerState.PLAYING;
            document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block';
            document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        }

        document.getElementById('play-trigger').onclick = () => {
            yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo();
        };

        async function loadDatabase() {
            data = {
              "stations": [
                { "name": "Vi-bration", "playlists": [
                    { "id": "PLwX0pb3GEremC1vfOY7jLfNqdfR2cTVi7", "title": "Beyond The Pen" },
                    { "id": "PLwX0pb3GErenzlrerMLur84f2JfArD1fK", "title": "Dreamscape" },
                    { "id": "PLwX0pb3GErek3NOvUZzKMk5hp1G_USaHW", "title": "The Fall Of Cain" }
                ]},
                { "name": "Ki-netic", "playlists": [
                    { "id": "PLwX0pb3GErekhqHtx2E2WMrB4DhdDJhlu-VbU3r-vQh9q", "title": "Blaze Mixtape" },
                    { "id": "PLwX0pb3GErekChtYZB_HejDEP3FWZ6o-l", "title": "Bmore Brick City" },
                    { "id": "PLwX0pb3GEreniBp2uNyHbV7Eh4euCbQQS", "title": "Drift Central" },
                    { "id": "PLwX0pb3GErel9qOq9jOVVscX_mxXzkGOK", "title": "Redline FM" },
                    { "id": "PLwX0pb3GEren9SyOR122ezYC8jkDeBQVB", "title": "Stylish Threadarts" }
                ]},
                { "name": "Chi-rful", "playlists": [
                    { "id": "PLwX0pb3GErekzDDrb9BzpjtrI5XdR6tU9", "title": "Freevibes FM" },
                    { "id": "PLwX0pb3GErensoCj0ooRyGbTXRvenbolF", "title": "Neon Cities" },
                    { "id": "PLwX0pb3GErengziTGztMV5k6jypR6mwkf", "title": "Starship FM" }
                ]},
                { "name": "Fox 1", "playlists": [
                    { "id": "PLwX0pb3GErekzDDrb9BzpjtrI5XdR6tU9", "title": "Freevibes FM" }
                ]}
              ]
            };
            buildInterface();
        }

        function buildInterface() {
            const tabs = document.getElementById('tabs-container');
            tabs.innerHTML = data.stations.map((s, i) => `
                <div class="tab ${i===0?'active':''}" onclick="switchStation(${i}, this)">${s.name}</div>
            `).join('');
            switchStation(0, tabs.firstElementChild);
        }

        function switchStation(idx, el) {
            activeStation = idx;
            scrollOffset = 0;
            document.documentElement.style.setProperty('--theme-color', colors[idx % colors.length]);
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('station-name').innerText = data.stations[idx].name;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid-container');
            grid.style.transform = `translateY(0px)`;
            grid.innerHTML = data.stations[activeStation].playlists.map(p => `
                <div class="tune-btn" onclick="handleTuneTap('${p.id}', '${p.title}', this)">${p.title}</div>
            `).join('');
        }

        window.handleTuneTap = (id, title, el) => {
            const now = Date.now();
            document.querySelectorAll('.tune-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if (lastBtn === el && (now - lastClick) < 400) {
                document.getElementById('flash').classList.add('trigger-flash');
                setTimeout(() => document.getElementById('flash').classList.remove('trigger-flash'), 150);
                document.getElementById('current-track').innerText = title;
                yt.loadPlaylist({ list: id, listType: 'playlist', index: 0 });
            } else {
                document.getElementById('current-track').innerText = "Load: " + title;
            }
            lastClick = now; lastBtn = el;
        };

        window.scrollGrid = (dir) => {
            const grid = document.getElementById('grid-container');
            scrollOffset = Math.max(0, scrollOffset + (dir * 70));
            grid.style.transform = `translateY(-${scrollOffset}px)`;
        };
    </script>
</body>
</html>
