<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower of Tunes | Commander Q</title>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --apple-blur: blur(20px);
            --theme-color: #0a84ff; /* Default Blue */
        }

        /* --- SYSTEM LOCKDOWN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background: #030008; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- VFX PROTOCOL --- */
        .vfx-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #0a001a 0%, #030008 100%); overflow: hidden;
        }
        .data-stream {
            position: absolute; width: 1px; background: linear-gradient(to bottom, transparent, var(--theme-color), transparent);
            opacity: 0.2; animation: streamDrop linear infinite; transition: background 0.5s;
        }
        @keyframes streamDrop { 0% { transform: translateY(-100vh); } 100% { transform: translateY(100vh); } }

        /* --- TOP NAV --- */
        .top-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px; z-index: 110; }
        .back-btn {
            display: inline-flex; align-items: center; text-decoration: none; color: #fff;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--apple-blur); border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px 18px; border-radius: 8px; transition: 0.3s;
        }

        /* --- COMMAND CENTER (CENTERED) --- */
        .interface-container {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; 
            padding: 15px; z-index: 10;
        }

        .glass-window {
            width: 100%; max-width: 700px; max-height: 95dvh;
            background: var(--glass); backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: clamp(15px, 4vw, 25px); text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- DYNAMIC HEADER --- */
        .header-tag { font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        .now-playing { 
            font-size: 0.9rem; font-weight: 800; text-transform: uppercase; color: #fff; 
            letter-spacing: 0.5px; margin-bottom: 15px; text-shadow: 0 0 10px var(--theme-color);
            transition: text-shadow 0.3s;
        }

        /* --- THE AURA PLAYER --- */
        .player-wrapper {
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; 
            border: 2px solid var(--theme-color); flex-shrink: 0;
            animation: dynamicPulse 3s infinite ease-in-out;
            transition: border-color 0.3s ease;
        }
        @keyframes dynamicPulse {
            0%, 100% { box-shadow: 0 0 10px var(--theme-color); }
            50% { box-shadow: 0 0 25px var(--theme-color); }
        }
        #yt-player { width: 100%; height: 100%; border: none; }
        .touch-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- MEDIA BAR --- */
        .media-controls-bar {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: rgba(0,0,0,0.6); border-radius: 30px; padding: 10px 25px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 5; flex-shrink: 0;
        }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .ctrl-btn:active { transform: scale(0.8); color: var(--theme-color); }
        .ctrl-btn svg { width: 24px; height: 24px; }
        .ctrl-btn.play-pause svg { width: 36px; height: 36px; }

        /* --- NAVIGATION TABS --- */
        .station-tabs {
            display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; flex-shrink: 0;
            background: rgba(0,0,0,0.3); border-radius: 10px; padding: 5px; gap: 4px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; border-radius: 6px;
            color: rgba(255,255,255,0.5); font-size: clamp(0.55rem, 2vw, 0.65rem); font-weight: 600; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-family: inherit;
            height: 38px; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .tab-btn.active { background: var(--theme-color); color: #fff; font-weight: 800; }

        /* --- PLAYLIST GRID --- */
        .video-list-nexus {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 450px; flex-shrink: 0;
        }
        .scroll-arrow { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer; padding: 2px; }
        .scroll-arrow:active { color: #fff; }

        .list-viewport {
            width: 100%; height: 112px; overflow: hidden; position: relative; margin: 2px 0;
        }
        .session-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            transition: transform 0.3s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .session-btn {
            height: 52px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-family: inherit; cursor: pointer; border-radius: 8px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; padding: 0 8px;
        }
        .session-btn.active { background: rgba(255,255,255,0.15); border-color: var(--theme-color); }
        .session-btn .pl-title { 
            font-size: 0.65rem; width: 100%; text-align: center; font-weight: 700; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* --- DESKTOP RESIZING --- */
        @media (min-width: 1024px) {
            .glass-window { max-width: 900px; padding: 25px 30px; }
            .player-wrapper { max-width: 460px; margin-bottom: 15px; }
            .session-grid { grid-template-columns: repeat(3, 1fr); }
            .session-btn { height: 54px; }
            .list-viewport { height: 116px; } 
            .session-btn .pl-title { font-size: 0.8rem; }
        }

        /* --- FOOTER --- */
        .vanguard-footer { margin-top: auto; padding-top: 10px; text-align: center; flex-shrink: 0; }
        .footer-content { font-size: 0.5rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; font-weight: 600; }

    </style>
</head>
<body>

    <div class="vfx-layer" id="vfx-bg"></div>

    <nav class="top-nav">
        <a href="../menu.html" class="back-btn"> &LT; RETURN </a>
    </nav>

    <main class="interface-container">
        <div class="glass-window">
            
            <header>
                <p class="header-tag">// TOWER_OF_TUNES</p>
                <h2 id="now-playing" class="now-playing">INITIALIZING SIGNAL...</h2>
            </header>

            <div class="player-wrapper">
                <div id="yt-player"></div>
                <div class="touch-shield"></div>
            </div>
            
            <div class="media-controls-bar">
                <button class="ctrl-btn" onclick="if(ytPlayer) ytPlayer.previousVideo();">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn play-pause" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="if(ytPlayer) ytPlayer.nextVideo();">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div class="station-tabs" id="station-tabs"></div>

            <div class="video-list-nexus">
                <button class="scroll-arrow" id="prev-btn">▲</button>
                <div class="list-viewport">
                    <div id="playlist-grid" class="session-grid"></div>
                </div>
                <button class="scroll-arrow" id="next-btn">▼</button>
            </div>

            <footer class="vanguard-footer">
                <div class="footer-content">Built by Commander Q 2026</div>
            </footer>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let ytPlayer;
        let isPlaying = false;
        let database = null;
        
        // Aura Protocol Colors
        const stationColors = ['#0a84ff', '#ff453a', '#ffd60a', '#bf5af2'];
        
        const grid = document.getElementById('playlist-grid');
        const titleDisplay = document.getElementById('now-playing');
        
        // Grid Math
        let currentRow = 0;
        let rowHeight = window.innerWidth >= 1024 ? 62 : 60; 
        let currentPlaylistCount = 0;

        window.addEventListener('resize', () => {
            rowHeight = window.innerWidth >= 1024 ? 62 : 60;
            grid.style.transform = `translateY(-${currentRow * rowHeight}px)`;
        });

        // VFX
        const bg = document.getElementById('vfx-bg');
        for(let i=0; i<15; i++) {
            const stream = document.createElement('div');
            stream.className = 'data-stream';
            stream.style.left = Math.random() * 100 + '%';
            stream.style.height = (Math.random() * 50 + 20) + 'vh';
            stream.style.animationDuration = (Math.random() * 3 + 2) + 's';
            stream.style.animationDelay = Math.random() * 2 + 's';
            bg.appendChild(stream);
        }

        // Initialize Player with explicit Autoplay
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1, /* Crucial for 1-tap mobile play */
                    'controls': 0, 
                    'disablekb': 1,
                    'modestbranding': 1,
                    'rel': 0,
                    'playsinline': 1
                },
                events: {
                    'onReady': () => {
                        fetch('../database/tunes.json')
                            .then(res => res.json())
                            .then(data => {
                                database = data;
                                renderStations();
                            });
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            if (event.data == YT.PlayerState.PLAYING) {
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                isPlaying = true;
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                isPlaying = false;
            }
        }

        // Central Play/Pause Toggle
        document.getElementById('btn-play').addEventListener('click', () => {
            if (!ytPlayer) return;
            isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
        });

        // Render Tabs
        const tabContainer = document.getElementById('station-tabs');
        function renderStations() {
            tabContainer.innerHTML = database.stations.map((station, idx) => `
                <button class="tab-btn ${idx === 0 ? 'active' : ''}" onclick="selectStation(${idx}, this)">
                    ${station.name}
                </button>
            `).join('');
            selectStation(0, tabContainer.firstElementChild, true); 
        }

        // Switch Stations & Render Grid
        window.selectStation = (stationIndex, btnEle, isInitialLoad = false) => {
            document.documentElement.style.setProperty('--theme-color', stationColors[stationIndex]);
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btnEle) btnEle.classList.add('active');

            const station = database.stations[stationIndex];
            currentPlaylistCount = station.playlists.length;
            currentRow = 0;
            grid.style.transform = `translateY(0px)`;

            grid.innerHTML = station.playlists.map(pl => `
                <button class="session-btn" onclick="directFirePlaylist('${pl.id}', '${pl.title}', this)">
                    <span class="pl-title">${pl.title}</span>
                </button>
            `).join('');

            if (isInitialLoad && station.playlists.length > 0) {
                titleDisplay.innerText = "STANDBY: " + station.playlists[0].title;
                const firstBtn = document.querySelector('.session-btn');
                if(firstBtn) firstBtn.classList.add('active');
            }
        };

        // Scroll Logic
        document.getElementById('next-btn').addEventListener('click', () => {
            const columns = window.innerWidth >= 1024 ? 3 : 2;
            const maxRows = Math.ceil(currentPlaylistCount / columns);
            if (currentRow < maxRows - 2) { 
                currentRow++;
                grid.style.transform = `translateY(-${currentRow * rowHeight}px)`;
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentRow > 0) {
                currentRow--;
                grid.style.transform = `translateY(-${currentRow * rowHeight}px)`;
            }
        });

        // ==========================================
        // DIRECT-FIRE API COMMAND (1-TAP FIX)
        // ==========================================
        window.directFirePlaylist = (playlistId, title, btnEle) => {
            // Update UI
            document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
            btnEle.classList.add('active');
            titleDisplay.innerText = title;

            // Direct, synchronous command to YouTube iframe
            ytPlayer.loadPlaylist({
                list: playlistId,
                listType: 'playlist',
                index: 0
            });
        };
    </script>
</body>
</html>
