<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Command Center</title>
    <link rel="stylesheet" href="vanguard-os.css">
</head>
<body>

    <!-- LAYER 1: Background Engine -->
    <div id="star-field"></div>

    <!-- LAYER 2: HUD Elements -->
    <div class="hud-top-left">
        <p id="system-date">LOADING...</p>
    </div>
    
    <div class="hud-top-right">
        <p id="system-clock">00:00:00</p>
    </div>

    <!-- LAYER 3: Main Interface -->
    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Commander Q</h1>
        </header>

        <!-- The Blurry Dashboard Window (Scrolling Container) -->
        <main class="app-dashboard">
            
            <!-- ROW 1 -->
            <div class="app-icon" data-label="AboutMe">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <span>About Me</span>
            </div>

            <div class="app-icon" data-label="Dreamscape">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M11.1,12.08C8.77,7.57,10.6,3.6,11.63,2.01C6.27,2.2,1.98,6.59,1.98,12c0,0.14,0.02,0.28,0.02,0.42 C2.62,12.15,3.29,12,4,12c1.66,0,3.18,0.83,4.1,2.15C9.77,14.63,11,16.17,11,18c0,1.52-0.87,2.83-2.12,3.51 c0.98,0.32,2.03,0.5,3.11,0.5c5.52,0,10-4.48,10-10C22,7.92,17.27,4.44,11.1,12.08z"/></svg>
                </div>
                <span>Dreamscape</span>
            </div>

            <div class="app-icon" data-label="MusicPlayer">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <span>Music Player</span>
            </div>

            <div class="app-icon" data-label="Blog">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
                </div>
                <span>Blog</span>
            </div>

            <!-- ROW 2 -->
            <div class="app-icon" data-label="SocialMedia">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                </div>
                <span>Social Media</span>
            </div>

            <div class="app-icon" data-label="Armory">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </div>
                <span>Armory</span>
            </div>

            <div class="app-icon" data-label="Comms">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                </div>
                <span>Comms</span>
            </div>

            <div class="app-icon" data-label="Settings">

                </div>
                <span>System</span>
            </div>

            <!-- ROW 3 (Scroll activates here) -->
            <div class="app-icon" data-label="Exit">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                </div>
                <span>Exit</span>
            </div>

        </main>
    </div>

    <!-- LAYER 4: Footer -->
    <footer class="vanguard-footer">
        Powered by The Vanguard Knights
    </footer>

    <!-- Logic Engine -->
    <script src="vanguard-os.js" defer></script>
</body>
</html>
