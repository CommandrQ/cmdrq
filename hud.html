<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Command Center</title>
    <link rel="stylesheet" href="vanguard-os.css">
</head>
<body>

    <!-- LAYER 1: Starfield Engine -->
    <div id="star-field"></div>

    <!-- LAYER 2: Main Interface -->
    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Commander Q</h1>
        </header>

        <!-- Integrated HUD Header anchored to the Window width -->
        <div class="hud-header">
            <p id="system-date">LOADING...</p>
            <p id="system-clock">00:00:00</p>
        </div>

        <main class="app-dashboard" id="app-dashboard">
            <!-- Apps are dynamically injected here -->
        </main>
    </div>

    <!-- Social Media Modal -->
    <div id="social-modal" class="modal-overlay">
        <div class="modal-window">
            <h2 class="modal-title">Frequency Established</h2>
            <p class="modal-text">Redirecting to the <strong>@commandr_q</strong> TikTok Uplink. Prepare for signal transmission.</p>
            <div class="modal-actions">
                <button onclick="VanguardOS.closeSocialModal()" class="modal-btn secondary">Abort</button>
                <a id="modal-link" href="#" target="_blank" class="modal-btn primary" onclick="VanguardOS.closeSocialModal()">Initiate Link</a>
            </div>
        </div>
    </div>

    <footer class="vanguard-footer">
        Powered by The Vanguard Knights
    </footer>

    <script src="vanguard-os.js" defer></script>
</body>
</html>
