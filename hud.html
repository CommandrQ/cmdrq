<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Command Center</title>
    <link rel="stylesheet" href="vanguard-os.css">
</head>
<body>

    <!-- LAYER 1: Background Engine -->
    <div id="star-field"></div>

    <!-- LAYER 2: HUD Elements -->
    <div class="hud-top-left">
        <p id="system-date">LOADING...</p>
    </div>
    
    <div class="hud-top-right">
        <p id="system-clock">00:00:00</p>
    </div>

    <!-- LAYER 3: Main Interface -->
    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Commander Q</h1>
        </header>

        <!-- The Blurry Dashboard Window (Scrolling Container) -->
        <main class="app-dashboard">
            
            <!-- ROW 1 -->
            <div class="app-icon" data-label="Origins">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <span>Origins</span>
            </div>

            <div class="app-icon" data-label="WarRoom">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                </div>
                <span>War Room</span>
            </div>

            <div class="app-icon" data-label="Frequencies">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <span>Audio</span>
            </div>

            <div class="app-icon" data-label="Uplink">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-10 12.5v-9l6 4.5-6 4.5z"/></svg>
                </div>
                <span>Uplink</span>
            </div>

            <!-- ROW 2 -->
            <div class="app-icon" data-label="Armory">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </div>
                <span>Armory</span>
            </div>

            <div class="app-icon" data-label="Archives">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                </div>
                <span>Archives</span>
            </div>

            <div class="app-icon" data-label="Comms">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                </div>
                <span>Comms</span>
            </div>

            <div class="app-icon" data-label="Settings">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                </div>
                <span>System</span>
            </div>

            <!-- ROW 3 (Scroll activates here) -->
            <div class="app-icon" data-label="Tactics">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5zm4 4h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
                </div>
                <span>Tactics</span>
            </div>

            <div class="app-icon" data-label="Network">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm4.5 10.5h-3v3h-3v-3h-3v-3h3v-3h3v3h3v3z"/></svg>
                </div>
                <span>Network</span>
            </div>

            <div class="app-icon" data-label="Modules">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/></svg>
                </div>
                <span>Modules</span>
            </div>

            <div class="app-icon" data-label="Exit">
                <div class="icon-box">
                    <svg class="glyph" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                </div>
                <span>Exit</span>
            </div>

        </main>
    </div>

    <!-- LAYER 4: Footer -->
    <footer class="vanguard-footer">
        Powered by The Vanguard Knights
    </footer>

    <!-- Logic Engine -->
    <script src="vanguard-os.js" defer></script>
</body>
</html>
