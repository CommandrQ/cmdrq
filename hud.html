<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Command Center</title>
    <link rel="stylesheet" href="vanguard-os.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- LAYER 1: Starfield Engine (Always Visible) -->
    <div id="star-field"></div>

    <!-- LAYER 2: Main Interface -->
    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Commander Q</h1>
        </header>

        <!-- 4-Column Scrollable Dashboard -->
        <main class="app-dashboard" id="app-dashboard">
            <!-- Apps injected here as solid buttons -->
        </main>
    </div>

    <!-- Social Media Modal -->
    <div id="social-modal" class="modal-overlay">
        <div class="modal-window">
            <h2 class="modal-title">Frequency Established</h2>
            <p class="modal-text">Redirecting to the TikTok Uplink. Prepare for signal transmission.</p>
            <div class="modal-actions" style="display: flex; justify-content: center; gap: 15px;">
                <button onclick="VanguardOS.closeModals()" class="modal-btn secondary">Abort</button>
                <a id="modal-link" href="#" target="_blank" class="modal-btn primary" onclick="VanguardOS.closeModals()">Initiate Link</a>
            </div>
        </div>
    </div>

    <footer class="vanguard-footer">
        Powered by Vanguard Citizen Services
    </footer>

    <script src="vanguard-os.js" defer></script>
</body>
</html>
