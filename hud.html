<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Command Center</title>
    <link rel="stylesheet" href="vanguard-os.css">
</head>
<body>

    <!-- LAYER 1: Background Engine -->
    <div id="star-field"></div>

    <!-- LAYER 2: HUD Elements -->
    <div class="hud-top-left">
        <p id="system-date">LOADING...</p>
    </div>
    
    <div class="hud-top-right">
        <p id="system-clock">00:00:00</p>
    </div>

    <!-- LAYER 3: Main Interface -->
    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Commander Q</h1>
        </header>

        <!-- The Blurry Dashboard Window -->
        <main class="app-dashboard" id="app-dashboard">
            <!-- Apps are now dynamically injected here by vanguard-os.js -->
        </main>
    </div>

    <!-- LAYER 4: Footer -->
    <footer class="vanguard-footer">
        Powered by The Vanguard Knights
    </footer>

    <!-- Logic Engine -->
    <script src="vanguard-os.js" defer></script>
</body>
</html>
