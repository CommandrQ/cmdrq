<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | HUD</title>
    <link rel="stylesheet" href="vanguard-os.css">
</head>
<body class="os-container">

    <div id="star-field"></div>

    <!-- MAIN DESKTOP -->
    <main class="desktop-grid">
        
        <!-- About Me / Origin Log -->
        <div class="app-icon" data-label="About" id="app-about">
            <div class="icon-box">
                <svg class="glyph" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span>Origin_Log</span>
        </div>

        <!-- War Room (Short Stories) -->
        <div class="app-icon" data-label="WarRoom">
            <div class="icon-box">
                <svg class="glyph" viewBox="0 0 24 24">
                    <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                </svg>
            </div>
            <span>War_Room</span>
        </div>

        <!-- Frequency Chamber (Music) -->
        <div class="app-icon" data-label="Music">
            <div class="icon-box">
                <svg class="glyph" viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <span>Frequencies</span>
        </div>

        <!-- TikTok Feed -->
        <div class="app-icon" data-label="Social">
            <div class="icon-box">
                <svg class="glyph" viewBox="0 0 24 24">
                    <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-10 12.5v-9l6 4.5-6 4.5z"/>
                </svg>
            </div>
            <span>Uplink</span>
        </div>

    </main>

    <!-- SYSTEM DOCK -->
    <footer class="vanguard-dock">
        <!-- Icons move here on double-click -->
    </footer>

    <script src="vanguard-os.js"></script>
</body>
</html>
