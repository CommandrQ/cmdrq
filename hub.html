<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander Q | Hub</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            /* Use dvh to account for mobile browser UI bars */
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Fade in from Black --- */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            pointer-events: none;
            animation: fadeOut 1.5s forwards ease-in-out;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* --- Starfield --- */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 95vw 80vh #fff, 
                        25vw 90vh #fff, 55vw 50vh #fff, 75vw 30vh #fff, 15vw 15vh #fff;
            animation: moveStars 150s linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        /* --- Header & Title --- */
        header {
            text-align: center;
            padding: 40px 20px 10px;
            z-index: 10;
        }

        .commander-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: bold;
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto;
            color: #8ecae6;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
            margin-bottom: 5px;
        }

        @keyframes sheen {
            to { background-position: 200% center; }
        }

        .status-text {
            font-size: 0.8rem;
            color: var(--light-purple);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* --- The Hub Grid --- */
        #menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 95%;
            max-width: 1000px;
            padding: 20px 10px 40px; /* Increased bottom padding */
            z-index: 10;
            flex-grow: 1; /* Allows grid to take up space and push footer down */
        }

        @media (min-width: 800px) {
            #menu-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
        }

        /* --- Dark Glass Cards --- */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 25px 10px;
            text-align: center;
            text-decoration: none;
            color: var(--light-blue);
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            font-size: 0.95rem;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--light-blue);
            background: rgba(142, 202, 230, 0.15);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
            color: white;
        }

        /* --- Pulsing White Footer --- */
        footer {
            z-index: 10;
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div id="starfield">
        <div class="stars"></div>
    </div>

    <header>
        <h1 class="commander-title">Commander Q</h1>
        <p class="status-text">Hub Active</p>
    </header>

    <main id="menu-grid">
        <!-- JS will inject links here -->
    </main>

    <footer>
        Powered by Vanguard Citizen Services
    </footer>

    <script>
        const HUB_LINKS = [
            { title: "About Me", url: "about.html" },
            { title: "Inso:An Introduction Class", url: "vkacademy/intro.html" },
            { title: "Journal", url: "journal/journal.html" },
            { title: "Dreamscape Drift",  url: "dreamscapedrift/dreamscape.html" },
            { title: "Music Player",  url: "musicplayer/musicplayer.html" },
            { title: "Social Media",  url: "https://www.tiktok.com/@commandr_q" },
            { title: "Profile",  url: "profile.html" }
        ];

        const sbUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const sbKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        
        if (typeof supabaseClient === 'undefined') {
            var supabaseClient = supabase.createClient(sbUrl, sbKey);
        }

        function initHub() {
            const grid = document.getElementById('menu-grid');
            
            HUB_LINKS.forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.className = 'card';
                card.innerText = item.title;

                if (item.url.startsWith('http')) {
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                }

                grid.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', initHub);
    </script>
</body>
</html>
