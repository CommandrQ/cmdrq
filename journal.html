<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Commander Q</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto; /* Ensures the page is scrollable */
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Background Animation --- */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 1000; pointer-events: none; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .stars { position: absolute; width: 2px; height: 2px; background: transparent; 
                  box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 60vw 50vh #fff;
                  animation: moveStars 150s linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* --- Header --- */
        header { text-align: center; padding: 40px 20px 10px; z-index: 10; width: 100%; }
        .commander-title { 
            font-size: clamp(1.8rem, 6vw, 2.5rem); font-weight: bold; 
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
        }
        @keyframes sheen { to { background-position: 200% center; } }

        /* --- Full Entry Grid --- */
        #journal-grid { 
            display: grid; grid-template-columns: repeat(1, 1fr); gap: 20px; 
            width: 90%; max-width: 800px; padding: 20px 0 60px; z-index: 10; 
        }
        /* Desktop: Show entries side-by-side if they are shorter, or keep as a clean list */
        @media (min-width: 800px) { #journal-grid { grid-template-columns: repeat(2, 1fr); } }

        .entry-card { 
            background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.3s ease;
            display: flex; flex-direction: column; height: 100%;
        }
        .entry-card:hover { border-color: var(--light-blue); box-shadow: 0 0 20px rgba(142, 202, 230, 0.2); }
        .entry-text { line-height: 1.8; color: #f0f0f0; font-size: 1.05rem; }
        .entry-footer { margin-top: 20px; display: flex; justify-content: flex-end; }
        .reply-btn-small { background: none; border: 1px solid var(--light-blue); color: var(--light-blue); padding: 8px 16px; border-radius: 50px; cursor: pointer; font-size: 0.8rem; }

        /* --- Modals --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; 
            display: none; justify-content: center; align-items: flex-start; 
            padding: 40px 20px; backdrop-filter: blur(10px); overflow-y: auto;
        }
        .modal-content { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); width: 100%; max-width: 500px;
            border-radius: 24px; padding: 30px; position: relative; margin: auto;
        }
        .btn-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; opacity: 0.6; }

        .btn { width: 100%; padding: 14px; border-radius: 50px; border: 1px solid var(--light-blue); background: transparent; color: var(--light-blue); font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: var(--light-blue); color: var(--deep-space); }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit; }

        footer { 
            z-index: 10; padding: 40px 20px; text-align: center; color: white; 
            font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; 
            animation: pulse 4s ease-in-out infinite; width: 100%; margin-top: auto;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* --- Mobile Tweaks --- */
        @media (max-width: 600px) {
            header { padding: 20px 20px 5px; }
            #journal-grid { grid-template-columns: 1fr; width: 95%; padding-top: 10px; }
            .entry-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <header>
        <h1 class="commander-title">Journal</h1>
    </header>

    <main id="journal-grid"></main>

    <!-- Reply Modal -->
    <div id="replyModal" class="modal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModal('replyModal')">&times;</button>
            
            <div id="signupForm" style="display:none;">
                <h3 style="color: var(--light-purple); margin-bottom: 15px;">Join the Hideout</h3>
                <input type="text" id="regName" placeholder="Full Name">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPass" placeholder="Password">
                <button class="btn" onclick="joinHideout()">Join</button>
            </div>

            <div id="messageForm" style="display:none;">
                <h3 style="color: var(--light-blue); margin-bottom: 15px;">Share a thought</h3>
                <textarea id="replyMsg" rows="5" placeholder="What's on your mind?"></textarea>
                <button class="btn" onclick="postMessage()">Post</button>
            </div>
        </div>
    </div>

    <footer>Powered by Vanguard Citizen Services</footer>

    <script>
        const sbUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const sbKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(sbUrl, sbKey);

        const ENTRIES = [
            "Everyone is talking about the systems that hold us back: the wage gap, the lack of freedom, the rigged game. And they’re right. But there’s a trap here: we spend so much time fighting for the 'win' that we’ve forgotten how to advance ourselves.",
            "We’re told that every 'no' is an opportunity. But if you don’t understand who you are or what you actually want, that opportunity is just noise.",
            "It’s like an athlete training just to stay in second place, or a cook who never intends to run their own kitchen. Why bother?",
            "The truth is that self-mastery and professional growth are the same thing. You can’t have one without the other.",
            "If we finally beat the system but we aren't grounded in who we are, we’ll squander the victory the second we get it. We’ll have the equality we fought for and no idea what to do with it.",
            "Choosing to do one thing well, to really master a craft, is what builds your identity. It’s how you learn to be a 'good person' in practice, not just in theory. Success isn't just about changing the world. It’s about making sure you're someone worth being when you finally get to where you're going."
        ];

        function init() {
            const grid = document.getElementById('journal-grid');
            ENTRIES.forEach((text, i) => {
                const el = document.createElement('div');
                el.className = 'entry-card';
                el.innerHTML = `
                    <div class="entry-text">${text}</div>
                    <div class="entry-footer">
                        <button class="reply-btn-small" onclick="openReplyFlow()">Reply</button>
                    </div>
                `;
                grid.appendChild(el);
            });
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function openReplyFlow() {
            document.getElementById('replyModal').style.display = 'flex';
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('messageForm').style.display = 'block';
                document.getElementById('signupForm').style.display = 'none';
            } else {
                document.getElementById('signupForm').style.display = 'block';
                document.getElementById('messageForm').style.display = 'none';
            }
        }

        async function joinHideout() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const { data, error } = await supabaseClient.auth.signUp({
                email, password: pass, options: { data: { full_name: name } }
            });
            if (error) return alert(error.message);
            await supabaseClient.from('citizens').insert([{ email, full_name: name, user_id: data.user.id, auth_id: data.user.id }]);
            alert("Welcome! You can now post your reply.");
            location.reload();
        }

        async function postMessage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const message = document.getElementById('replyMsg').value;
            if (!message) return alert("Please type something.");
            const { error } = await supabaseClient.from('blogreplies').insert([{ email: user.email, full_name: user.user_metadata.full_name, message }]);
            if (error) alert(error.message);
            else { alert("Shared!"); closeModal('replyModal'); }
        }

        window.onload = init;
    </script>
</body>
</html>
