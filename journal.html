<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Commander Q</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.8);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Starfield Background --- */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 1000; pointer-events: none; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .stars { position: absolute; width: 2px; height: 2px; background: transparent; 
                  box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 55vw 50vh #fff;
                  animation: moveStars 150s linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* --- Header --- */
        header { text-align: center; padding: 25px 20px 10px; z-index: 10; width: 100%; }
        .commander-title { 
            font-size: clamp(1.8rem, 6vw, 2.5rem); font-weight: bold; 
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
        }
        @keyframes sheen { to { background-position: 200% center; } }

        /* --- Journal Grid (2 Columns Mobile) --- */
        #journal-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 95%; 
            max-width: 1000px; 
            padding: 10px 10px 40px; 
            z-index: 10; 
        }
        @media (min-width: 800px) { #journal-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }

        .journal-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        .journal-title { 
            font-size: 1rem; 
            color: var(--light-purple); 
            font-weight: 600; 
            margin-bottom: 15px;
            line-height: 1.3;
        }

        /* --- Buttons --- */
        .btn {
            background: none;
            border: 1px solid var(--light-blue);
            color: var(--light-blue);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { background: var(--light-blue); color: var(--deep-space); box-shadow: 0 0 15px var(--light-blue); }

        /* --- Modals (Popups) --- */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; 
            display: none; justify-content: center; align-items: center; 
            padding: 20px; backdrop-filter: blur(10px);
        }
        
        .modal-window { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            width: 100%; 
            max-width: 500px;
            border-radius: 28px; 
            padding: 30px; 
            position: relative; 
            max-height: 80vh; 
            overflow-y: auto;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-window { transform: scale(1); opacity: 1; }

        .close-x { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .entry-content { line-height: 1.8; color: #f0f0f0; margin-top: 20px; font-size: 1.05rem; }

        /* --- Forms --- */
        input, textarea { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit; 
        }

        footer { 
            z-index: 10; padding: 40px 20px; text-align: center; color: white; 
            font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; 
            animation: pulse 4s ease-in-out infinite; width: 100%; margin-top: auto;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <header>
        <h1 class="commander-title">Journal Hub</h1>
    </header>

    <main id="journal-grid"></main>

    <!-- Reading Modal -->
    <div id="readModal" class="modal-overlay" onclick="handleOverlayClick(event, 'readModal')">
        <div class="modal-window">
            <button class="close-x" onclick="closeModal('readModal')">&times;</button>
            <div id="fullEntryText" class="entry-content"></div>
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn" style="flex: 1;" onclick="openReplyModal()">Reply</button>
            </div>
        </div>
    </div>

    <!-- Auth/Reply Modal -->
    <div id="replyModal" class="modal-overlay" onclick="handleOverlayClick(event, 'replyModal')">
        <div class="modal-window">
            <button class="close-x" onclick="closeModal('replyModal')">&times;</button>
            
            <div id="signupForm" style="display:none;">
                <h3 style="color: var(--light-purple); margin-bottom: 15px;">Join the Hideout</h3>
                <input type="text" id="regName" placeholder="What's your full name?">
                <input type="email" id="regEmail" placeholder="Email address">
                <input type="password" id="regPass" placeholder="Pick a password">
                <button class="btn" style="width:100%; background:var(--light-purple); color:var(--deep-space);" onclick="joinHideout()">Register</button>
            </div>

            <div id="messageForm" style="display:none;">
                <h3 style="color: var(--light-blue); margin-bottom: 15px;">Share a thought</h3>
                <textarea id="replyMsg" rows="5" placeholder="Write your reply here..."></textarea>
                <button class="btn" style="width:100%;" onclick="postMessage()">Post to Journal</button>
            </div>
        </div>
    </div>

    <footer>Powered by Vanguard Citizen Services</footer>

    <script>
        const sbUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const sbKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(sbUrl, sbKey);

        const ENTRIES = [
            { title: "The Wage Gap Trap", text: "Everyone is talking about the systems that hold us back: the wage gap, the lack of freedom, the rigged game. And they’re right. But there’s a trap here: we spend so much time fighting for the 'win' that we’ve forgotten how to advance ourselves." },
            { title: "Opportunities & Noise", text: "We’re told that every 'no' is an opportunity. But if you don’t understand who you are or what you actually want, that opportunity is just noise." },
            { title: "The Why Bother?", text: "It’s like an athlete training just to stay in second place, or a cook who never intends to run their own kitchen. Why bother?" },
            { title: "Mastery of Self", text: "The truth is that self-mastery and professional growth are the same thing. You can’t have one without the other." },
            { title: "The Risk of Squandering", text: "If we finally beat the system but we aren't grounded in who we are, we’ll squander the victory the second we get it. We’ll have the equality we fought for and no idea what to do with it." },
            { title: "Crafting Identity", text: "Choosing to do one thing well, to really master a craft, is what builds your identity. It’s how you learn to be a 'good person' in practice, not just in theory. Success isn't just about changing the world. It’s about making sure you're someone worth being when you finally get to where you're going." }
        ];

        function init() {
            const grid = document.getElementById('journal-grid');
            ENTRIES.forEach((entry, i) => {
                const card = document.createElement('div');
                card.className = 'journal-card';
                card.innerHTML = `
                    <div class="journal-title">${entry.title}</div>
                    <button class="btn" onclick="openReadModal(${i})">Read</button>
                `;
                grid.appendChild(card);
            });
        }

        function openReadModal(index) {
            document.getElementById('fullEntryText').innerText = ENTRIES[index].text;
            const modal = document.getElementById('readModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        async function openReplyModal() {
            closeModal('readModal');
            const modal = document.getElementById('replyModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('messageForm').style.display = 'block';
                document.getElementById('signupForm').style.display = 'none';
            } else {
                document.getElementById('signupForm').style.display = 'block';
                document.getElementById('messageForm').style.display = 'none';
            }
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function handleOverlayClick(e, id) {
            if (e.target.classList.contains('modal-overlay')) closeModal(id);
        }

        async function joinHideout() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const { data, error } = await supabaseClient.auth.signUp({
                email, password: pass, options: { data: { full_name: name } }
            });
            if (error) return alert("Hmm, something went wrong: " + error.message);
            
            await supabaseClient.from('citizens').insert([{ 
                email, full_name: name, user_id: data.user.id, auth_id: data.user.id 
            }]);
            
            alert("Welcome! You can now post your reply.");
            location.reload();
        }

        async function postMessage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const message = document.getElementById('replyMsg').value;
            if (!message) return alert("The message is empty, friend.");
            
            const { error } = await supabaseClient.from('blogreplies').insert([{ 
                email: user.email, full_name: user.user_metadata.full_name, message 
            }]);
            
            if (error) alert("Sorry, I couldn't save that: " + error.message);
            else { alert("Thank you for sharing."); closeModal('replyModal'); document.getElementById('replyMsg').value = ""; }
        }

        window.onload = init;
    </script>
</body>
</html>
