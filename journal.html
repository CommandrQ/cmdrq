<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Commander Q</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Background Effects --- */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 1000; pointer-events: none; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .stars { position: absolute; width: 2px; height: 2px; background: transparent; 
                  box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 55vw 50vh #fff;
                  animation: moveStars 150s linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        header { text-align: center; padding: 20px 20px 10px; z-index: 10; width: 100%; }
        .commander-title { 
            font-size: clamp(1.8rem, 6vw, 2.5rem); font-weight: bold; 
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
        }
        @keyframes sheen { to { background-position: 200% center; } }

        /* --- Journal Grid (2-Column Mobile) --- */
        #journal-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 95%; 
            max-width: 1000px; 
            padding: 10px 10px 40px; 
            z-index: 10; 
        }
        @media (min-width: 800px) { #journal-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }

        .journal-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }

        .journal-title { font-size: 0.95rem; color: var(--light-purple); font-weight: 600; margin-bottom: 15px; line-height: 1.4; }

        .btn {
            background: none;
            border: 1px solid var(--light-blue);
            color: var(--light-blue);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { background: var(--light-blue); color: var(--deep-space); box-shadow: 0 0 15px var(--light-blue); }

        /* --- Modals (Popups) --- */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; 
            display: none; justify-content: center; align-items: center; 
            padding: 20px; backdrop-filter: blur(10px);
        }
        
        .modal-window { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            width: 100%; max-width: 500px; border-radius: 28px; 
            padding: 30px; position: relative; max-height: 80vh; 
            overflow-y: auto; transform: translateY(20px); opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-window { transform: translateY(0); opacity: 1; }

        .close-x { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .entry-content { line-height: 1.8; color: #f0f0f0; margin-top: 20px; font-size: 1.05rem; white-space: pre-line; }

        /* --- Forms --- */
        input, textarea { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit;
        }

        footer { 
            z-index: 10; padding: 40px 20px; text-align: center; color: white; 
            font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; 
            animation: pulse 4s ease-in-out infinite; width: 100%; margin-top: auto;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <header>
        <h1 class="commander-title">Journal</h1>
    </header>

    <main id="journal-grid"></main>

    <!-- Reading Modal -->
    <div id="readModal" class="modal-overlay">
        <div class="modal-window">
            <button class="close-x" onclick="closeModal('readModal')">&times;</button>
            <div id="fullEntryText" class="entry-content"></div>
            <button class="btn" style="width:100%; margin-top:30px;" onclick="openReplyModal()">Write a thought back</button>
        </div>
    </div>

    <!-- Identity/Reply Modal -->
    <div id="replyModal" class="modal-overlay">
        <div class="modal-window">
            <button class="close-x" onclick="closeModal('replyModal')">&times;</button>
            
            <div id="signupForm" style="display:none;">
                <h3 style="color: var(--light-purple); margin-bottom: 15px;">Join the Hideout</h3>
                <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;">To leave a note, I just need to know who you are.</p>
                <input type="text" id="regName" placeholder="What's your full name?">
                <input type="email" id="regEmail" placeholder="Email address">
                <input type="password" id="regPass" placeholder="Pick a password">
                <button class="btn" style="width:100%; background:var(--light-purple); color:var(--deep-space);" onclick="joinHideout()">I'm ready to join</button>
            </div>

            <div id="messageForm" style="display:none;">
                <h3 style="color: var(--light-blue); margin-bottom: 15px;">Share a thought</h3>
                <textarea id="replyMsg" rows="5" placeholder="What did this spark in you?"></textarea>
                <button class="btn" style="width:100%;" onclick="postMessage()">Share with the Commander</button>
            </div>
        </div>
    </div>

    <footer>Powered by Vanguard Citizen Services</footer>

    <script>
        const sbUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const sbKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(sbUrl, sbKey);

        const ENTRIES = [
            { 
                title: "The Systems and the Self", 
                text: `Everyone is talking about the systems that hold us back: the wage gap, the lack of freedom, the rigged game. And they’re right. But there’s a trap here: we spend so much time fighting for the "win" that we’ve forgotten how to advance ourselves.\n\nWe’re told that every "no" is an opportunity. But if you don’t understand who you are or what you actually want, that opportunity is just noise. It’s like an athlete training just to stay in second place, or a cook who never intends to run their own kitchen. Why bother?\n\nThe truth is that self-mastery and professional growth are the same thing. You can’t have one without the other. If we finally beat the system but we aren't grounded in who we are, we’ll squander the victory the second we get it. We’ll have the equality we fought for and no idea what to do with it.\n\nChoosing to do one thing well, to really master a craft, is what builds your identity. It’s how you learn to be a "good person" in practice, not just in theory. Success isn't just about changing the world. It’s about making sure you're someone worth being when you finally get to where you're going.` 
            },
            {
                title: "Internal Mastery",
                text: `Character isn't built when you have everything you need. It’s defined when you have nothing.\n\nI see people with "good jobs" and steady money who still claim they "can’t do it." They’re stuck, waiting for some external shift to fix their lives. But they’re looking in the wrong place. If you can’t advance professionally right now, you should be expanding personally. There is no excuse for stagnation when the problem is internal.\n\nThe irony is that we have the entire world at our fingertips. We have access to every bit of human knowledge, yet when it comes to our own character, we act like we’re working with a few scraps of paper. We have the data, but we lack the discipline to use it.\n\nIt comes down to the small choices. If you aren’t moving forward, it’s not because the information isn’t there; it’s because you’ve stopped looking at the tiny decisions that lead to a better future. Mastery of yourself is the only advancement that actually belongs to you.`
            },
            {
                title: "The Three Respects",
                text: `It is often easy to dismiss the idea of self-mastery when you are currently drowning in the practical demands of survival. When you are working a job simply because you have to keep the lights on and the fridge full, you might feel like the rules of personal growth are luxuries intended for people with more time and better bank accounts. However, the reality is that a personal code becomes more essential when the stakes are this high because without a foundation, the stress of your circumstances will eventually erode the very person you are trying to protect.\n\nWe must understand that respecting others is often expressed through the quiet dignity of providing for those who depend on us. When you show up to a place you do not want to be so that your family can be safe, you are not failing at life, but are instead performing an act of high-level respect that transforms a paycheck into a testament of your character. If you view your labor as a deliberate trade made to honor your responsibilities, then the job is no longer a cage but a tool that you are using to fulfill your word to the people who matter most.\n\nAt the same time, you must respect yourself by maintaining a clear internal boundary between the work you perform and the identity you hold. If you allow the frustrations of a difficult shift or a demanding boss to dictate your self-worth, you are essentially surrendering your freedom for free. Respecting yourself means acknowledging that while your time may be currently spoken for, your mind and your standards remain your own property, and this internal clarity is what prevents a "have-to" situation from becoming a permanent state of soul-crushing stagnation.\n\nFinally, respecting your environment requires you to accept the hard facts of your current reality without the added weight of useless bitterness. You cannot navigate a difficult season if you are busy pretending that the obstacles in your way should not exist, because fighting the physics of a bill or a job market only drains the energy you need to eventually create a better opportunity. When you align these three respects, you create a sense of harmony that is psychologically difficult to argue against. You are no longer just a victim of circumstance, but a person of substance who is navigating a brutal trade-off with their head held high, proving that endurance in the face of necessity is the ultimate form of advancement.`
            },
            {
                title: "The War Within",
                text: `The most difficult rule to follow is often the first one: you must respect yourself. This is the foundation because every other win in your life depends on the quality of your internal dialogue. When you tell yourself that you are trash or that you have no idea what you are doing, you are doing more than just venting frustration. You are effectively resigning from your own life before the struggle even has a chance to sharpen you into something better.\n\nWe are taught to dream big and imagine ourselves a hundred feet high in the clouds, yet we seem to lack the internal structure to survive a fall. The moment we hear a "no" or hit a wall, we collapse entirely because our worth was tied to a dream instead of a discipline. This dramatic fall happens because we haven't mastered the art of being our own ally. It is much easier to be your own greatest enemy, as that role requires nothing but a loud voice and a few harsh labels to keep you from ever taking a real risk again.\n\nYou have to realize that you are the only person who is present for every single second of your journey, which makes the choice to respect yourself a matter of basic survival. If you are constantly sabotaging your own confidence with self-put-downs, you are essentially fighting a war on two fronts: one against the world and one against the person in the mirror. You cannot win the external race if you are busy tripping yourself at the starting line.\n\nThe question of who you will conquer is the only one that actually matters. You can spend your energy trying to please a boss or beat a system, but until you conquer the impulse to devalue your own effort, you will always be stuck. Being your own ally means looking at the "no" and the "hard" and the "impossible" and deciding that you are worth the effort it takes to find a way through.`
            },
            {
                title: "The Humility Shield",
                text: `The most dangerous lies are the ones we tell ourselves under the guise of being realistic or humble. When you constantly downplay your abilities or shrug off your achievements, you are not actually practicing humility, but are instead constructing a psychological barrier that keeps you safe from the risks of your own potential. We use self-deprecation as a shield because if we admit that we are truly capable, then we are suddenly responsible for the outcomes of our lives. It is much easier to say that we are not ready than it is to face the weight of what we might actually achieve if we stopped standing in our own way.\n\nThis habit of internal sabotage creates a massive gap between where you are today and the goals you claim to pursue. You cannot reach for a better future if your hands are busy holding onto the idea that you are fundamentally flawed or that you don't know what you are doing. We often talk about changing the world as if it requires a massive external revolution, yet we ignore the most significant change that is actually within our immediate control. Changing the world does not mean you have to fix every broken system or solve every global crisis all at once. It simply means starting with the way you value your own existence and the quality of the respect you give to yourself.\n\nOnce you stop being your own most persistent critic, the external obstacles start to look like challenges rather than dead ends. The first victory has to happen inside your own mind before it can ever manifest in your career or your relationships. You have to decide that you are no longer willing to be the primary enemy of your own progress. If the world is already going to offer you plenty of resistance, there is no logical reason for you to join in and fight against yourself as well.`
            },
            {
                title: "The Weight of the Tether",
                text: `Outgrowing the people I used to run with is a bittersweet realization because I have to admit that the version of them I love only exists in my memory and not in the room with me today. I find myself looking at friends I’ve known for years and realizing that the fire we used to share has burned out into a cold pile of ash that we are both just staring at out of habit. It feels like a physical tether snapping inside my chest when I decide to finally walk away and become a stranger to people who used to know my every thought. Most people call that cold or selfish but if I am actually following my own rule to respect my environment then I have to be honest about the fact that a stagnant circle is just a graveyard for my potential.\n\nCommander Q didn't survive a war by holding onto every piece of equipment or every person that slowed the mission down and she certainly doesn't expect me to sacrifice my growth for the sake of someone else's comfort. She is the leader of the Vanguard Knights because she understands that you cannot empower a single soul if you are still standing in the same mud as the people you are trying to lift up. I used to think that loyalty meant staying the same forever but now I see that staying in a circle that no longer fits is actually a form of disrespect to everyone involved. I am lying to them by pretending I still value the things they value and I am disrespecting myself by trying to squeeze my new life into an old box that is way too small.\n\nThe guilt of leaving people behind is just the price I have to pay for deciding that I actually want to be someone worth being. If my environment is not actively pushing me to be better then it is actively pulling me back down to the baseline of everyone else's excuses. I am choosing to break the tether because the person I am becoming needs a different kind of oxygen to survive and I cannot breathe in a room full of people who are content with suffocating. I have to reach the higher ground alone before I can ever hope to reach back down and pull anyone else up with me.`
            }
        ];

        function init() {
            const grid = document.getElementById('journal-grid');
            ENTRIES.forEach((entry, i) => {
                const card = document.createElement('div');
                card.className = 'journal-card';
                card.innerHTML = `
                    <div class="journal-title">${entry.title}</div>
                    <button class="btn" onclick="openReadModal(${i})">Read</button>
                `;
                grid.appendChild(card);
            });
        }

        function openReadModal(index) {
            document.getElementById('fullEntryText').innerText = ENTRIES[index].text;
            const modal = document.getElementById('readModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        async function openReplyModal() {
            closeModal('readModal');
            const modal = document.getElementById('replyModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('messageForm').style.display = 'block';
                document.getElementById('signupForm').style.display = 'none';
            } else {
                document.getElementById('signupForm').style.display = 'block';
                document.getElementById('messageForm').style.display = 'none';
            }
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        async function joinHideout() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const { data, error } = await supabaseClient.auth.signUp({
                email, password: pass, options: { data: { full_name: name } }
            });
            if (error) return alert("Hmm, something went wrong: " + error.message);
            
            await supabaseClient.from('citizens').insert([{ 
                email, full_name: name, user_id: data.user.id, auth_id: data.user.id 
            }]);
            
            alert("Welcome! You can now post your reply.");
            location.reload();
        }

        async function postMessage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const message = document.getElementById('replyMsg').value;
            if (!message) return alert("Feel free to type something first.");
            
            const { error } = await supabaseClient.from('blogreplies').insert([{ 
                email: user.email, full_name: user.user_metadata.full_name, message 
            }]);
            
            if (error) alert("Oops: " + error.message);
            else { alert("Sent!"); closeModal('replyModal'); }
        }

        window.onload = init;
    </script>
</body>
</html>
