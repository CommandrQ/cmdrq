<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project V - Notification Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        p {
            color: #666;
            max-width: 400px;
            margin-bottom: 30px;
        }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0051cb;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Project V Notification Test</h1>
    <p>This is a lightweight, app-free test to see if your mobile device can receive sovereign text alerts directly from the browser.</p>

    <button onclick="sendNotification()">Trigger Alert</button>

    <div id="status">Status: Waiting for interaction...</div>

    <script>
        // Check if the browser supports notifications
        if (!("Notification" in window)) {
            document.getElementById('status').innerText = "Status: This browser does not support notifications.";
        } else {
            document.getElementById('status').innerText = "Status: Browser supported. Current Permission: " + Notification.permission;
        }

        function sendNotification() {
            // Step 1: Request permission if not already granted
            if (Notification.permission === "granted") {
                triggerActualNotification();
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    document.getElementById('status').innerText = "Status: Permission " + permission;
                    if (permission === "granted") {
                        triggerActualNotification();
                    }
                });
            } else {
                document.getElementById('status').innerText = "Status: Notifications blocked in browser settings.";
            }
        }

        function triggerActualNotification() {
            const options = {
                body: "Project V: A new local infrastructure hazard has been logged near you.",
                icon: "https://via.placeholder.com/128", // Replace with your Project V logo URL
                vibrate: [200, 100, 200], // Vibrate pattern for Android devices
                tag: "project-v-alert" // Prevents duplicate notifications
            };

            // Send the notification
            new Notification("Project V Alert", options);
            document.getElementById('status').innerText = "Status: Notification sent!";
        }
    </script>

</body>
</html>
