<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project V - Live Data Test</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json,{%22name%22:%22Project%20V%22,%22short_name%22:%22ProjectV%22,%22start_url%22:%22test.html%22,%22display%22:%22standalone%22}">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .data-box {
            background-color: #e3f2fd;
            border-left: 5px solid #2196f3;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 4px;
        }
        .timestamp {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Project V</h1>
        <h3>Sovereign Content Test</h3>
        <p>Testing how content updates in the background without notifications.</p>

        <div class="data-box">
            <strong>Current System Status:</strong>
            <!-- TEST VALUE: Change the text inside this span to see it update live -->
            <p id="live-data">TEST RUN #1: System is active and watching Hardin County infrastructure.</p>
            <div class="timestamp">Last Updated Code: Version 1.0</div>
        </div>

        <button onclick="checkUpdates()">Check For Updates</button>
    </div>

    <script>
        // Simple Service Worker Registration to keep it running as a PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=unique_test_1');
        }

        function checkUpdates() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    for(let registration of registrations) {
                        registration.update().then(() => {
                            // Clear cache and reload browser view
                            caches.keys().then(names => {
                                for (let name of names) caches.delete(name);
                            });
                            window.location.reload(true);
                        });
                    }
                });
            }
        }
    </script>

</body>
</html>
