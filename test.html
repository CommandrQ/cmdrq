<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project V - Alert Test</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json,{%22name%22:%22Project%20V%22,%22short_name%22:%22ProjectV%22,%22start_url%22:%22test.html%22,%22display%22:%22standalone%22}">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 350px;
        }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Project V</h1>
        <p>Testing sovereign browser alerts.</p>

        <button onclick="sendNotification()">Test Alert</button>

        <div id="status">Initializing...</div>
    </div>

    <script>
        // Register the external service worker file explicitly
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Project V Worker Registered"))
                .catch(err => console.log("Worker Registration Failed: ", err));
        }

        function checkStatus() {
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const statusDiv = document.getElementById('status');

            if (isIOS && !isStandalone) {
                statusDiv.innerText = "iOS Lock: Use Safari 'Add to Home Screen' to unlock.";
                return false;
            }

            statusDiv.innerText = "System Ready. Permission: " + (window.Notification ? Notification.permission : "Not Found");
            return true;
        }

        function sendNotification() {
            if (!checkStatus()) return;

            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification("Project V Alert", {
                            body: "A new local infrastructure hazard has been logged near you.",
                            vibrate: [200, 100, 200]
                        });
                        document.getElementById('status').innerText = "Alert sent!";
                    });
                } else {
                    document.getElementById('status').innerText = "Permission Denied.";
                }
            });
        }

        // Keep updating the status text
        setInterval(checkStatus, 1000);
    </script>

</body>
</html>
