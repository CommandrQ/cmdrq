<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings | Commander Q</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centering everything */
            text-align: center;
        }

        /* --- Background Animation --- */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 1000; pointer-events: none; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .stars { position: absolute; width: 2px; height: 2px; background: transparent; 
                  box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff;
                  animation: moveStars 150s linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* --- Content Layout --- */
        .settings-container {
            width: 90%;
            max-width: 450px;
            z-index: 10;
            padding: 20px 0;
        }

        .commander-title { 
            font-size: clamp(1.8rem, 6vw, 2.5rem); font-weight: bold; 
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
            margin-bottom: 30px;
        }
        @keyframes sheen { to { background-position: 200% center; } }

        /* --- Glass Console --- */
        .settings-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        h2 { color: var(--light-blue); margin-bottom: 25px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .user-info { margin-bottom: 30px; }
        .user-info p { color: var(--light-purple); font-size: 0.9rem; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .citizen-display { font-size: 1.5rem; font-weight: bold; color: white; letter-spacing: 2px; }
        .user-email { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 5px; }

        /* --- Form Elements --- */
        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; 
            font-family: inherit; text-align: center;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 50px; border: 1px solid var(--light-blue); 
            background: transparent; color: var(--light-blue); font-weight: bold; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.85rem;
            margin-bottom: 15px; text-decoration: none; display: inline-block;
        }
        .btn:hover { background: var(--light-blue); color: var(--deep-space); box-shadow: 0 0 15px var(--light-blue); }
        
        .btn-danger { border-color: #ff6b6b; color: #ff6b6b; }
        .btn-danger:hover { background: #ff6b6b; color: white; box-shadow: 0 0 15px #ff6b6b; }

        .hidden { display: none; }

        footer { 
            z-index: 10; padding: 40px 20px; text-align: center; color: white; 
            font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; 
            animation: pulse 4s ease-in-out infinite; width: 100%;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="boot-screen"></div>
    <div id="starfield"><div class="stars"></div></div>

    <div class="settings-container">
        <h1 class="commander-title">Settings</h1>

        <main class="settings-card">
            
            <!-- Logged Out View -->
            <div id="auth-form" class="hidden">
                <h2>Access the Hideout</h2>
                <input type="email" id="login-email" placeholder="Email Address">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn" onclick="handleLogin()">Login</button>
            </div>

            <!-- Logged In View -->
            <div id="user-profile" class="hidden">
                <h2>Citizen Data</h2>
                <div class="user-info">
                    <p>Verified User</p>
                    <div id="display-id" class="citizen-display">----</div>
                    <div id="display-email" class="user-email">...</div>
                </div>
                <button class="btn" onclick="handleLogout()">Securely Exit</button>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">

            <h2>System Control</h2>
            <button class="btn btn-danger" onclick="wipeCache()">Clear Data Logs</button>

        </main>

        <a href="hub.html" class="btn" style="width: auto; padding: 10px 25px;">Return to Hub</a>
    </div>

    <footer>Powered by Vanguard Citizen Services</footer>

    <script>
        const sbUrl = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const sbKey = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(sbUrl, sbKey);

        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('display-email').innerText = user.email;
                
                // Fetch Citizen Number from database
                const { data, error } = await supabaseClient
                    .from('citizens')
                    .select('citizen_number')
                    .eq('user_id', user.id)
                    .single();

                if (data && data.citizen_number) {
                    document.getElementById('display-id').innerText = "#" + data.citizen_number;
                } else {
                    document.getElementById('display-id').innerText = "UNASSIGNED";
                }
            } else {
                document.getElementById('auth-form').classList.remove('hidden');
                document.getElementById('user-profile').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            
            if (error) {
                alert("Access Denied: " + error.message);
            } else {
                checkSession();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            checkSession();
        }

        function wipeCache() {
            if (confirm("This will clear all local data logs. Are you sure?")) {
                localStorage.clear();
                sessionStorage.clear();
                alert("Data logs cleared.");
                location.reload();
            }
        }

        window.onload = checkSession;
    </script>
</body>
</html>
