<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Audio Uplink</title>
    <style>
        /* CONFIGURATION */
        :root {
            --glow-color: #8ecae6;
            --glass: rgba(15, 15, 25, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f0c29;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* BACKGROUND */
        #starfield { position: fixed; inset: 0; z-index: -1; }
        .stars { 
            position: absolute; width: 2px; height: 2px; background: white; 
            box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 55vw 50vh #fff;
            animation: moveStars 150s linear infinite; 
        }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* MENU DECK */
        .menu-deck {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            z-index: 10;
        }

        .menu-deck h1 { font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; color: #8ecae6; }

        .station-list { display: flex; flex-direction: column; gap: 15px; }

        .station-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            color: white;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .station-btn:hover {
            background: rgba(142, 202, 230, 0.15);
            border-color: #8ecae6;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* MODAL OVERLAY */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            width: 90%;
            max-width: 600px;
            background: var(--glass);
            border: 2px solid var(--glow-color);
            border-radius: 25px;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 50px var(--glow-color);
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
        .modal-header h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--glow-color); }
        
        .close-btn {
            background: none;
            border: 1px solid var(--glow-color);
            color: var(--glow-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .close-btn:hover { background: var(--glow-color); color: #0f0c29; }

        .return-link { display: inline-block; margin-top: 30px; font-size: 0.7rem; opacity: 0.4; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>

    <!-- MAIN MENU -->
    <div class="menu-deck">
        <h1>Select Frequency</h1>
        <div class="station-list" id="station-list"></div>
        <a href="../hub.html" class="return-link">RETURN TO HUB</a>
    </div>

    <!-- MODAL WINDOW -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Frequency Locked</h2>
                <button class="close-btn" onclick="closeModal()">Close Uplink</button>
            </div>
            <div class="video-container">
                <div id="yt-player"></div>
            </div>
        </div>
    </div>

    <script>
        /* PLAYLIST DATA */
        const STATIONS = [
            { name: "Da Rave House", id: "PLwX0pb3GErekxR63LzwnP82HdlLcSowCi", color: "#8ecae6" },
            { name: "Freevibes FM", id: "PLwX0pb3GErelUOQaMntIwjrO1o8Y79qjw", color: "#e0c3fc" }
        ];

        /* INIT */
        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: { 'listType': 'playlist', 'modestbranding': 1, 'autoplay': 1 }
            });
            renderMenu();
        }

        function renderMenu() {
            const list = document.getElementById('station-list');
            STATIONS.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = 'station-btn';
                btn.innerText = s.name;
                btn.onclick = () => openUplink(i);
                list.appendChild(btn);
            });
        }

        /* MODAL LOGIC */
        function openUplink(index) {
            const s = STATIONS[index];
            const modal = document.getElementById('modal');
            
            // Set visuals
            document.documentElement.style.setProperty('--glow-color', s.color);
            document.getElementById('modal-title').innerText = "Signal: " + s.name;

            // Show Modal
            modal.classList.add('active');

            // Load Playlist
            player.loadPlaylist({
                list: s.id,
                listType: 'playlist',
                index: 0
            });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            // Pause music when closing the window
            if (player) player.pauseVideo();
        }

        // Close on clicking outside the box
        window.onclick = (e) => {
            const modal = document.getElementById('modal');
            if (e.target == modal) closeModal();
        }
    </script>
</body>
</html>
