<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Audio Uplink</title>
    <style>
        /* CATEGORY: STYLES */
        :root {
            --glow-color: #8ecae6;
            --glass: rgba(15, 15, 25, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #0f0c29;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CATEGORY: BACKGROUND */
        #starfield { position: fixed; inset: 0; z-index: -1; }
        .stars { 
            position: absolute; width: 2px; height: 2px; background: white; 
            box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 55vw 50vh #fff;
            animation: moveStars 150s linear infinite; 
        }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* CATEGORY: MENU UI */
        .menu-deck {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .menu-deck h1 { 
            font-size: 1.2rem; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            color: #8ecae6; 
            text-shadow: 0 0 10px rgba(142, 202, 230, 0.5);
        }

        .station-list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            max-height: 400px; 
            overflow-y: auto;
            padding: 5px;
        }

        .station-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .station-btn:hover {
            background: rgba(142, 202, 230, 0.15);
            border-color: #8ecae6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* CATEGORY: MODAL & RADIATING GLOW */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            width: 95%;
            max-width: 700px;
            background: #000;
            border: 2px solid var(--glow-color);
            border-radius: 20px;
            padding: 15px;
            position: relative;
            animation: glowRadiate 3s infinite ease-in-out;
        }

        @keyframes glowRadiate {
            0% { box-shadow: 0 0 20px var(--glow-color), inset 0 0 10px var(--glow-color); }
            50% { box-shadow: 0 0 60px var(--glow-color), inset 0 0 20px var(--glow-color); }
            100% { box-shadow: 0 0 20px var(--glow-color), inset 0 0 10px var(--glow-color); }
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        iframe { width: 100%; height: 100%; border: none; }

        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            padding: 5px 10px 0; 
        }
        
        .modal-header h2 { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--glow-color); 
        }
        
        .close-btn {
            background: var(--glow-color);
            border: none;
            color: #0f0c29;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .close-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .return-link { display: inline-block; margin-top: 30px; font-size: 0.7rem; opacity: 0.4; color: white; text-decoration: none; transition: 0.3s; }
        .return-link:hover { opacity: 1; color: #8ecae6; }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>

    <div class="menu-deck">
        <h1>Frequency Menu</h1>
        <div class="station-list" id="station-list"></div>
        <a href="../hub.html" class="return-link">RETURN TO HUB</a>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Signal Online</h2>
                <button class="close-btn" onclick="closeModal()">Terminate Uplink</button>
            </div>
            <div class="video-container">
                <div id="yt-player"></div>
            </div>
        </div>
    </div>

    <script>
        /* CATEGORY: DATA ENGINE */
        const STATIONS = [
            { 
                name: "Commander Q Mixes", 
                id: "PLwX0pb3GErenzxXjayWA-U4A_GKKnMsgP", 
                color: "#CF9FFF" 
            }
        ];

        /* CATEGORY: CORE LOGIC */
        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: { 
                    'listType': 'playlist', 
                    'modestbranding': 1, 
                    'autoplay': 1,
                    'rel': 0 
                }
            });
            renderMenu();
        }

        function renderMenu() {
            const list = document.getElementById('station-list');
            list.innerHTML = "";
            STATIONS.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = 'station-btn';
                btn.innerText = s.name;
                btn.onclick = () => openUplink(i);
                list.appendChild(btn);
            });
        }

        function openUplink(index) {
            const s = STATIONS[index];
            const modal = document.getElementById('modal');
            
            document.documentElement.style.setProperty('--glow-color', s.color);
            document.getElementById('modal-title').innerText = s.name + " // Active";

            modal.classList.add('active');

            player.loadPlaylist({
                list: s.id,
                listType: 'playlist',
                index: 0
            });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            if (player && typeof player.stopVideo === 'function') {
                player.stopVideo();
            }
        }

        window.onclick = (e) => {
            const modal = document.getElementById('modal');
            if (e.target == modal) closeModal();
        }
    </script>
</body>
</html>
