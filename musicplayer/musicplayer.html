<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Audio Uplink</title>
    <style>
        /* CSS VARIABLES */
        :root {
            --glow-color: #8ecae6;
            --glass: rgba(15, 15, 25, 0.85);
            --border: rgba(255, 255, 255, 0.15);
        }

        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f0c29;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* BACKGROUND EFFECTS */
        #starfield { position: fixed; inset: 0; z-index: -1; }
        .stars { 
            position: absolute; width: 2px; height: 2px; background: white; 
            box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 55vw 50vh #fff;
            animation: moveStars 150s linear infinite; 
        }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* PLAYER CONTAINER */
        .player-deck {
            width: 95%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .title-area { margin-bottom: 25px; }
        .title-area h1 { font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; color: var(--glow-color); transition: 0.5s; }
        .status-text { font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; }

        /* NATIVE PLAYER BOX */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glow-color);
            box-shadow: 0 0 20px -5px var(--glow-color);
            transition: 0.5s;
            margin-bottom: 25px;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* STATION GRID */
        .playlist-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 20px;
        }
        .pl-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pl-card:hover { 
            background: rgba(255,255,255,0.1); 
            border-color: var(--glow-color); 
            color: var(--glow-color);
            transform: translateY(-2px);
        }

        .return-link { 
            display: inline-block; margin-top: 10px; font-size: 0.7rem; color: white; 
            text-decoration: none; opacity: 0.4; transition: 0.3s;
        }
        .return-link:hover { opacity: 1; color: var(--glow-color); }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>

    <div class="player-deck">
        <header class="title-area">
            <h1>Audio Uplink</h1>
            <p class="status-text" id="status">Select Frequency</p>
        </header>

        <!-- THE NATIVE PLAYER -->
        <div class="video-container" id="player-box">
            <div id="yt-player"></div>
        </div>

        <div class="playlist-grid" id="grid"></div>

        <a href="../hub.html" class="return-link">RETURN TO COMMAND CENTER</a>
    </div>

    <script>
        /* PLAYLIST DATA */
        const STATIONS = [
            {
                name: "Da Rave House",
                id: "PLwX0pb3GErekxR63LzwnP82HdlLcSowCi",
                color: "#8ecae6"
            },
            {
                name: "Freevibes FM",
                id: "PLwX0pb3GErelUOQaMntIwjrO1o8Y79qjw",
                color: "#e0c3fc"
            }
        ];

        /* PLAYER INITIALIZATION */
        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'listType': 'playlist',
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady() {
            const grid = document.getElementById('grid');
            STATIONS.forEach((s, i) => {
                const card = document.createElement('div');
                card.className = 'pl-card';
                card.innerText = s.name;
                card.onclick = () => tuneIn(i);
                grid.appendChild(card);
            });
        }

        /* STATION SWITCHING */
        function tuneIn(index) {
            const station = STATIONS[index];
            
            // Update Visuals
            document.documentElement.style.setProperty('--glow-color', station.color);
            document.getElementById('status').innerText = "Frequency: " + station.name;

            // Load Playlist
            player.loadPlaylist({
                list: station.id,
                listType: 'playlist',
                index: 0,
                suggestedQuality: 'medium'
            });
        }
    </script>
</body>
</html>
