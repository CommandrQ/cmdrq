<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Audio Uplink</title>
    <style>
        :root {
            --glow-color: #8ecae6;
            --glass: rgba(15, 15, 25, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0c29;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- Animated Starfield --- */
        #starfield { position: fixed; inset: 0; z-index: -1; }
        .stars { 
            position: absolute; width: 2px; height: 2px; background: white; 
            box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 80vw 10vh #fff, 25vw 90vh #fff, 55vw 50vh #fff;
            animation: moveStars 150s linear infinite; 
        }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-2000px); } }

        /* --- Player UI --- */
        .player-deck {
            width: 90%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .title-area h1 { 
            font-size: 1.4rem; letter-spacing: 4px; text-transform: uppercase; 
            color: var(--glow-color); transition: 0.5s; margin-bottom: 5px;
        }
        .status-text { font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }

        /* --- The Glowing Core --- */
        .visualizer-area {
            position: relative;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 25px 0;
        }

        .core {
            position: absolute;
            width: 100px;
            height: 100px;
            background: var(--glow-color);
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.4;
            animation: pulse 4s infinite ease-in-out;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.4); opacity: 0.6; }
        }

        .track-display { z-index: 2; width: 100%; padding: 0 10px; }
        .track-display h2 { 
            font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .track-display p { font-size: 0.8rem; color: var(--glow-color); opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Controls --- */
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 35px; }
        
        .btn-side { 
            background: none; border: 1px solid var(--border); color: white; 
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .btn-side:hover { border-color: var(--glow-color); color: var(--glow-color); }

        .btn-main {
            background: var(--glow-color); border: none; color: #0f0c29;
            padding: 15px 45px; border-radius: 50px; font-weight: bold; font-size: 0.9rem;
            cursor: pointer; box-shadow: 0 0 20px rgba(142, 202, 230, 0.4); transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--glow-color); }

        /* --- Selection Grid --- */
        .playlist-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            max-height: 150px; overflow-y: auto; padding-right: 5px;
        }
        
        .playlist-grid::-webkit-scrollbar { width: 4px; }
        .playlist-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .pl-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 12px; border-radius: 15px; font-size: 0.75rem; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .pl-card:hover { background: rgba(255,255,255,0.1); border-color: var(--glow-color); }

        .return-link { 
            display: inline-block; margin-top: 30px; font-size: 0.7rem; color: white; 
            text-decoration: none; opacity: 0.4; transition: 0.3s;
        }
        .return-link:hover { opacity: 1; color: var(--glow-color); }
    </style>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>

    <div class="player-deck">
        <div class="title-area">
            <h1>Audio Uplink</h1>
            <p class="status-text" id="status">System Ready</p>
        </div>

        <div class="visualizer-area">
            <div class="core" id="glow-core"></div>
            <div class="track-display">
                <h2 id="display-name">Awaiting Signal</h2>
                <p id="display-sub">Station Offline</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn-side" onclick="prev()">«</button>
            <button class="btn-main" id="playBtn" onclick="toggle()">PLAY</button>
            <button class="btn-side" onclick="next()">»</button>
        </div>

        <div class="playlist-grid" id="grid"></div>

        <a href="../hub.html" class="return-link">RETURN TO COMMAND CENTER</a>
    </div>

    <div id="yt-api-frame" style="position: absolute; top: -9999px;"></div>

    <script>
        // --- RENAMED TRANSMISSIONS ---
        const PLAYLISTS = [
            {
                name: "Da Rave House",
                url: "https://youtube.com/playlist?list=PLwX0pb3GErekxR63LzwnP82HdlLcSowCi&si=v4E5IySA0KgpsYg1",
                color: "#8ecae6"
            },
            {
                name: "Freevibes FM",
                url: "https://youtube.com/playlist?list=PLwX0pb3GErelUOQaMntIwjrO1o8Y79qjw&si=-vcAkAOZ91-buqDb",
                color: "#e0c3fc"
            }
        ];

        let player;
        let activeStationName = "";

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function initGrid() {
            const grid = document.getElementById('grid');
            PLAYLISTS.forEach((pl, i) => {
                const item = document.createElement('div');
                item.className = 'pl-card';
                item.innerText = pl.name;
                item.onclick = () => tuneIn(i);
                grid.appendChild(item);
            });
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api-frame', {
                height: '0', width: '0',
                playerVars: { 
                    'listType': 'playlist', 
                    'modestbranding': 1,
                    'autoplay': 0
                },
                events: {
                    'onReady': () => { console.log("Uplink Active"); },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Logic to update UI when song changes
        function onPlayerStateChange(event) {
            const btn = document.getElementById('playBtn');
            const sub = document.getElementById('display-sub');
            const nameDisplay = document.getElementById('display-name');

            if (event.data === YT.PlayerState.PLAYING) {
                btn.innerText = "PAUSE";
                document.getElementById('status').innerText = "Streaming";
                
                // Fetch song title from the player
                const videoData = player.getVideoData();
                if (videoData && videoData.title) {
                    nameDisplay.innerText = videoData.title;
                    sub.innerText = activeStationName; // Shows station name as the sub-text
                }
            } 
            else if (event.data === YT.PlayerState.PAUSED) {
                btn.innerText = "PLAY";
                document.getElementById('status').innerText = "Paused";
            }
        }

        function tuneIn(index) {
            const data = PLAYLISTS[index];
            activeStationName = data.name;
            
            const match = data.url.match(/[&?]list=([^&]+)/);
            const listId = match ? match[1] : null;

            if (listId && player) {
                document.documentElement.style.setProperty('--glow-color', data.color);
                document.getElementById('status').innerText = "Connecting...";

                // Load and automatically start playing to prevent the double-click issue
                player.loadPlaylist({
                    list: listId,
                    listType: 'playlist',
                    index: 0,
                    suggestedQuality: 'small'
                });
                
                // Adding a slight delay and force play to bypass "cued" state
                setTimeout(() => {
                    player.playVideo();
                }, 500);
            }
        }

        function toggle() {
            if (!player) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        }

        function next() { if(player) player.nextVideo(); }
        function prev() { if(player) player.previousVideo(); }

        window.onload = initGrid;
    </script>
</body>
</html>
