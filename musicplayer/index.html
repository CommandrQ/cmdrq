<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comms Deck | Music Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div id="starfield"><div class="stars"></div></div>

    <div class="player-container">
        <header>
            <h1 class="deck-title">Vanguard Audio Uplink</h1>
            <p id="playlist-desc">SELECT A FREQUENCY</p>
        </header>

        <!-- The Glowing Core -->
        <div class="audio-visualizer">
            <div class="core-glow" id="core"></div>
            <div class="track-info">
                <h2 id="now-playing">Awaiting Signal...</h2>
                <p id="current-artist">System Idle</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-icon" onclick="prevTrack()">prev</button>
            <button class="btn-play" id="playBtn" onclick="togglePlay()">PLAY</button>
            <button class="btn-icon" onclick="nextTrack()">next</button>
        </div>

        <!-- Playlist Selector -->
        <div class="playlist-grid" id="playlistGrid"></div>

        <a href="../hub.html" class="btn-return">Return to Hub</a>
    </div>

    <!-- Hidden YouTube Player -->
    <div id="youtube-player" style="position: absolute; top: -9999px;"></div>

    <script src="app.js"></script>
</body>
</html>
