<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSUBI | Tactical HUD Music Player</title>
    
    <link rel="stylesheet" href="css/menu.css?v=106">
    <link rel="stylesheet" href="css/cursor.css?v=1">
    
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="action-mode">
    
    <div class="purple-radial-glow"></div>
    
    <div class="stars"></div>
    <div id="matrix-lines"></div>
    <div class="scanlines"></div>

    <div class="hud-wrapper">
        <header class="hud-header">
            <div class="status-indicator">
                <span class="flicker-dot"></span> SYSTEM_STATUS: <span class="cyan-text">ACTIVE</span>
            </div>
            <div class="time-readout" id="clock">00:00:00</div>
        </header>

        <main class="tactical-layout">
            
            <section class="node-matrix" id="node-matrix-left"></section>

            <div class="center-column">
                
                <div class="video-viewport">
                    <div id="youtube-engine"></div>
                    <div class="viewport-overlay"></div>
                </div>

                <div class="avatar-central-node">
                    <div class="avatar-frame">
                        <img src="images/commanderqhs.png" alt="Commander QHS" class="avatar-img">
                    </div>
                </div>
            </div>

            <section class="node-matrix" id="node-matrix-right"></section>
        </main>

        <footer class="hud-footer">
            <div class="footer-text-container">
                <span class="footer-text">BUILT BY COMMANDER Q.</span>
                <span class="footer-text">EMPOWER. EDUCATE. ELEVATE.</span>
            </div>
        </footer>
    </div>

    <div class="musubi-cursor-dot"></div>

    <script src="js/cursor.js?v=1"></script>
    <script src="js/menu.js?v=106"></script>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                               now.getMinutes().toString().padStart(2, '0') + ":" + 
                               now.getSeconds().toString().padStart(2, '0');
            const clockElement = document.getElementById('clock');
            if(clockElement) clockElement.textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
