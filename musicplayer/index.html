<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Playlist Terminal</title>
    <style>
        /* === 1. VISUAL ARCHITECTURE & BACKGROUND === */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents the page itself from scrolling */
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
        }

        #sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #050510 0%, #1a0b2e 60%, #5c2055 100%);
            z-index: 1;
        }

        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        #sun {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 250px;
            background: linear-gradient(to bottom, #ffdb58, #ff8c00);
            border-radius: 50%;
            z-index: 3;
            animation: pulse 4s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 30px 10px rgba(255, 140, 0, 0.4), 0 0 80px 20px rgba(255, 69, 0, 0.2); opacity: 0.8; }
            100% { box-shadow: 0 0 60px 20px rgba(255, 140, 0, 0.7), 0 0 120px 40px rgba(255, 69, 0, 0.4); opacity: 1; }
        }

        /* === 2. THE TERMINAL UI === */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #ipod {
            width: 95%;
            max-width: 380px;
            height: 90vh;
            max-height: 750px;
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 2px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #screen {
            background: #0a0f0d;
            border: 2px solid #2a3b32;
            border-radius: 10px;
            height: 25%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #00ffcc;
            box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.1);
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
            overflow: hidden;
            flex-shrink: 0;
        }

        .sys-status {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #00ffcc;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        #track-title {
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.4;
            word-wrap: break-word;
            flex-grow: 1;
        }

        #time-display { font-size: 0.85rem; text-align: right; }

        /* Controls */
        #controls-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-row { display: flex; justify-content: space-between; gap: 10px; }

        button {
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        button:active { background: #00ffcc; color: #000; border-color: #00ffcc; }
        button:hover { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

        /* === 3. HORIZONTAL STATIONS CAROUSEL === */
        .section-title {
            color: #aaa;
            font-size: 0.75rem;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        #stations-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-bottom: 10px;
        }

        #stations-container {
            display: flex;
            overflow-x: hidden; /* Hide scrollbar, rely on arrows */
            scroll-behavior: smooth;
            gap: 10px;
            flex: 1;
            padding: 5px 0;
        }

        .station-btn {
            flex: 0 0 auto; /* Prevents buttons from shrinking */
            width: auto;
            min-width: 80px;
            padding: 8px 15px;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
        }

        .station-btn:hover { background: rgba(0, 255, 204, 0.3); }

        .scroll-arrow {
            color: #00ffcc;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            padding: 5px;
            animation: arrow-bounce 1.5s infinite alternate;
        }

        @keyframes arrow-bounce {
            0% { transform: scale(1); text-shadow: 0 0 5px rgba(0,255,204,0.2); }
            100% { transform: scale(1.2); text-shadow: 0 0 15px rgba(0,255,204,0.8); }
        }

        /* === 4. VERTICAL PLAYLIST MENU === */
        #playlists-container {
            flex: 1; 
            min-height: 0; 
            overflow-y: auto; 
            padding-right: 5px; 
            scrollbar-width: thin;
            scrollbar-color: #00ffcc transparent;
        }
        
        #playlists-container::-webkit-scrollbar { width: 6px; }
        #playlists-container::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 3px; }
        #playlists-container::-webkit-scrollbar-thumb { background-color: #00ffcc; border-radius: 3px; }

        .playlist-btn {
            display: block;
            width: 100%;
            margin-bottom: 8px;
            background: transparent;
            border: 1px dashed #555;
            text-align: left;
            padding: 10px;
        }

        /* Hidden YouTube Iframe */
        #yt-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="sky">
        <canvas id="starfield"></canvas>
        <div id="sun"></div>
    </div>

    <div id="ui-layer">
        <div id="ipod">
            <div id="screen">
                <div class="sys-status">
                    <span>YT-OS v1.3</span>
                    <span id="player-status">INITIALIZING...</span>
                </div>
                <div id="track-title">Awaiting data connection...</div>
                <div id="time-display">0:00 / 0:00</div>
            </div>

            <div id="controls-container">
                <div class="btn-row">
                    <button id="prev-btn">|&lt; PREV</button>
                    <button id="next-btn">NEXT &gt;|</button>
                </div>
                <div class="btn-row">
                    <button id="play-btn">PLAY</button>
                    <button id="pause-btn">PAUSE</button>
                </div>
            </div>

            <div class="section-title">Global Stations</div>
            <div id="stations-wrapper">
                <div class="scroll-arrow" id="scroll-left">&#10094;</div>
                <div id="stations-container">
                    <button class="station-btn">LOFI</button>
                    <button class="station-btn">SYNTH</button>
                    <button class="station-btn">AMBIENT</button>
                    <button class="station-btn">CYBER</button>
                    <button class="station-btn">PHONK</button>
                    <button class="station-btn">CHILL</button>
                </div>
                <div class="scroll-arrow" id="scroll-right">&#10095;</div>
            </div>

            <div class="section-title">Local Database (JSON)</div>
            <div id="playlists-container">
                </div>
        </div>
    </div>

    <div id="yt-player"></div>

    <script>
        /* === STARFIELD LOGIC === */
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 1.5, speed: Math.random() * 0.5 + 0.1 });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
                star.x -= star.speed; 
                if (star.x < 0) { star.x = canvas.width; star.y = Math.random() * canvas.height; }
            });
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animateStars();

        /* === HORIZONTAL SCROLL LOGIC === */
        document.getElementById('scroll-left').addEventListener('click', () => {
            document.getElementById('stations-container').scrollBy({ left: -120, behavior: 'smooth' });
        });
        
        document.getElementById('scroll-right').addEventListener('click', () => {
            document.getElementById('stations-container').scrollBy({ left: 120, behavior: 'smooth' });
        });

        /* === DYNAMIC PLAYLIST FETCH LOGIC === */
        async function loadPlaylists() {
            const container = document.getElementById('playlists-container');
            
            try {
                const response = await fetch('playlists.json');
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                
                const playlists = await response.json();
                
                playlists.forEach(playlist => {
                    const btn = document.createElement('button');
                    btn.className = 'playlist-btn';
                    btn.setAttribute('data-playlist', playlist.id);
                    btn.innerText = playlist.title;
                    
                    btn.addEventListener('click', function() {
                        if (player) {
                            player.loadPlaylist({ list: playlist.id, listType: 'playlist', index: 0 });
                        }
                    });
                    
                    container.appendChild(btn);
                });
            } catch (error) {
                console.error("Failed to load playlists:", error);
                document.getElementById('track-title').innerText = "DATABASE ERROR: Verify playlists.json path and syntax.";
                document.getElementById('track-title').style.color = "#ff4444";
            }
        }

        loadPlaylists();

        /* === YOUTUBE API LOGIC === */
        let player, updateInterval;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1', width: '1',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('player-status').innerText = "ONLINE";
            const titleEl = document.getElementById('track-title');
            if(!titleEl.innerText.includes("ERROR")) titleEl.innerText = "Select a Database below to begin playback.";
        }

        function onPlayerStateChange(event) {
            clearInterval(updateInterval);
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('player-status').innerText = "PLAYING";
                const videoData = player.getVideoData();
                document.getElementById('track-title').style.color = "#00ffcc"; 
                document.getElementById('track-title').innerText = videoData.title || "Unknown Track";
                updateInterval = setInterval(updateTimeDisplay, 1000);
            } else if (event.data == YT.PlayerState.PAUSED) {
                document.getElementById('player-status').innerText = "PAUSED";
            } else if (event.data == YT.PlayerState.BUFFERING) {
                document.getElementById('player-status').innerText = "BUFFERING...";
            }
        }

        /* === CONTROLS === */
        document.getElementById('play-btn').addEventListener('click', () => player && player.playVideo());
        document.getElementById('pause-btn').addEventListener('click', () => player && player.pauseVideo());
        document.getElementById('next-btn').addEventListener('click', () => player && player.nextVideo());
        document.getElementById('prev-btn').addEventListener('click', () => player && player.previousVideo());

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function updateTimeDisplay() {
            if (player && player.getCurrentTime) {
                const current = player.getCurrentTime();
                const total = player.getDuration();
                if (total) document.getElementById('time-display').innerText = `${formatTime(current)} / ${formatTime(total)}`;
            }
        }
    </script>
</body>
</html>
