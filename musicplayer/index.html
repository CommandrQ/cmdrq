<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSUBI | Radio Uplink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stars"></div>

    <div class="terminal-wrapper">
        <header class="hud-header">
            <a href="../menu.html" class="exit-btn"><< EXIT</a>
            <div class="status-box">SYSTEM: <span id="status-text" class="cyan">READY</span></div>
        </header>

        <section class="monitor-area">
            <div id="loader" class="loader">ESTABLISHING UPLINK...</div>
            <iframe id="main-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </section>

        <main class="ui-area">
            <nav class="category-tabs" id="category-tabs"></nav>
            <div class="playlist-list" id="playlist-list">
                <p class="placeholder">AWAITING FREQUENCY SELECTION...</p>
            </div>
        </main>
        
        <footer class="hud-footer">
            <div class="now-playing" id="now-playing">NO TARGET SELECTED</div>
            <div class="svg-cluster">
                <svg class="icon" id="svg-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                <svg class="icon" id="svg-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
