<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOWER OF TUNES // HUD_v1.0</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>

    <div class="starfield"></div>
    <div class="scanlines"></div>
    <div class="radial-glow" id="glow"></div>

    <header class="hud-header">
        <div class="system-meta">
            <span id="clock">SYSTEM_TIME: 00:00:00</span>
            <span class="location-tag">LOCATION: THE_HIDEOUT // TOWER_OF_TUNES</span>
        </div>
        <button onclick="window.location.href='../menu.html'" class="return-btn">
            [ RETURN_TO_BASE ]
        </button>
    </header>

    <main class="command-center">
        <section class="player-container">
            <div id="player-frame">
                <div id="youtube-player"></div>
            </div>
            <div id="station-status">STATUS: STANDBY_FOR_BROADCAST</div>
        </section>

        <nav id="station-nav" class="station-grid"></nav>

        <section class="substation-container">
            <h3 class="list-header">AVAILABLE_FREQUENCIES</h3>
            <div id="substation-list">
                <div class="initial-load-msg">INITIALIZING_DATA_LINK...</div>
            </div>
        </section>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/menu.js"></script>
</body>
</html>
