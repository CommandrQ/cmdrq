<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOWER OF TUNES // HUD</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
    <div class="starfield"></div>
    <div class="scanlines"></div>
    <div class="radial-glow" id="glow"></div>

    <header class="hud-header">
        <div id="clock">SYSTEM_TIME: 00:00:00</div>
        <button onclick="window.location.href='../menu.html'" class="return-btn">[ RETURN_TO_BASE ]</button>
    </header>

    <main class="command-center">
        <div id="player-frame">
            <div id="youtube-player"></div>
        </div>

        <div class="media-controls">
            <button onclick="player.previousVideo()">[ PREV ]</button>
            <button id="play-pause-btn" onclick="togglePlay()">[ PLAY/PAUSE ]</button>
            <button onclick="player.nextVideo()">[ NEXT ]</button>
        </div>

        <div class="station-container">
            <div id="station-nav" class="station-swiper"></div>
        </div>

        <div class="playlist-container">
            <div id="substation-list" class="scroll-list">
                <div class="loading-text">AWAITING_SIGNAL...</div>
            </div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/menu.js"></script>
</body>
</html>
