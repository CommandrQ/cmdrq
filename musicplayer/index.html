<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander's Console // Tactical HUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="hud-container">
        <div class="video-wrapper">
            <div id="youtube-player"></div>
        </div>

        <div class="track-info">
            <h2 id="track-title">SYSTEM STANDBY // WAITING FOR DATALINK</h2>
        </div>

        <div class="media-controls">
            <button id="btn-prev" class="hud-btn">PREV</button>
            <button id="btn-play-pause" class="hud-btn highlight-gold">PLAY / PAUSE</button>
            <button id="btn-next" class="hud-btn">NEXT</button>
        </div>

        <div class="station-slider" id="station-slider-container">
            </div>

        <div class="playlist-container" id="playlist-master-container">
            </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/app.js"></script>
</body>
</html>
