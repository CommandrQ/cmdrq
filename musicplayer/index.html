<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Starfield Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="starfield"></div>
    
    <div class="glass-container">
        <header>
            <h1 class="neon-text">NEON STATION</h1>
            <p id="current-track">Select a playlist to begin</p>
        </header>

        <main>
            <div id="player"></div> <div class="controls">
                <button id="prev">PREV</button>
                <button id="play-pause" class="neon-border">PLAY</button>
                <button id="next">NEXT</button>
            </div>

            <div class="station-browser" id="station-list">
                </div>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
