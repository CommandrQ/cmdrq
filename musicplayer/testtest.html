<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander QHS | Official Terminal</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #7b2ff7 0%, #2bd1ff 100%);
            --neon-blue: #2bd1ff;
            --bg-dark: #020205;
            --text-main: #ffffff;
            /* Custom Pointer */
            cursor: url('images/pointer.png'), auto;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            /* SF Pro / System Font Stack */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* --- SIDE HUD WITH WAVEFORMS (Desktop) --- */
        .hud-sidebar {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 120px;
            height: 300px;
            display: none;
            flex-direction: row;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px;
            border: 1px solid rgba(43, 209, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
        }

        @media (min-width: 1100px) {
            .hud-sidebar { display: flex; }
            .left-hud { left: 4vw; }
            .right-hud { right: 4vw; }
        }

        .wave-bar {
            width: 8px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            animation: wave-pulse 1.5s infinite ease-in-out;
        }

        @keyframes wave-pulse {
            0%, 100% { height: 20%; opacity: 0.4; }
            50% { height: 80%; opacity: 1; }
        }

        /* --- MAIN LAYOUT --- */
        .container {
            width: 90%;
            max-width: 480px;
            padding: 60px 0;
            text-align: center;
            z-index: 5;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            padding: 5px;
            margin-bottom: 15px;
        }

        .mini-intro {
            font-size: 0.95rem;
            color: #a0a0a0;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        /* --- SHIMMER TEXT --- */
        .shimmer {
            font-weight: 800;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #555 0%, #fff 50%, #555 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-effect 3s infinite linear;
        }

        @keyframes shimmer-effect {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* --- BUTTON STYLES --- */
        .stack { display: flex; flex-direction: column; gap: 16px; }

        .btn {
            background: var(--primary-gradient);
            color: white;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            display: block;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(123, 47, 247, 0.4);
        }

        .btn-primary-offer {
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .lead-magnet-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            border: 1px dashed rgba(43, 209, 255, 0.3);
        }

        .input-mini {
            width: 80%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Waveform HUDs -->
    <div class="hud-sidebar left-hud">
        <div class="wave-bar" style="animation-delay: 0.1s"></div>
        <div class="wave-bar" style="animation-delay: 0.4s"></div>
        <div class="wave-bar" style="animation-delay: 0.2s"></div>
        <div class="wave-bar" style="animation-delay: 0.6s"></div>
    </div>

    <div class="hud-sidebar right-hud">
        <div class="wave-bar" style="animation-delay: 0.3s"></div>
        <div class="wave-bar" style="animation-delay: 0.0s"></div>
        <div class="wave-bar" style="animation-delay: 0.5s"></div>
        <div class="wave-bar" style="animation-delay: 0.2s"></div>
    </div>

    <div class="container">
        <!-- Profile & Intro -->
        <img src="images/commanderqhs.png" alt="Commander QHS" class="profile-img">
        <div class="shimmer">Commander QHS</div>
        <p class="mini-intro">Mastering the digital frontier. Mission: Bridging the gap between retro aesthetics and future tech for the modern creator.</p>

        <div id="content-stack" class="stack">
            <!-- JS will inject Primary Offer, Lead Magnet, and Content here -->
        </div>
    </div>

    <script>
        // CONFIGURATION: Set 'active: false' to hide any element
        const siteConfig = {
            primaryOffer: {
                title: "🚀 JOIN THE ACADEMY",
                url: "#",
                active: true
            },
            leadMagnet: {
                title: "Free Retro-Tech Asset Pack",
                active: true
            },
            links: [
                { title: "Latest YouTube Video", url: "#", active: true },
                { title: "Twitter Terminal", url: "#", active: true },
                { title: "GitHub Repository", url: "#", active: true },
                { title: "Old Blog Post", url: "#", active: false }
            ]
        };

        const stack = document.getElementById('content-stack');

        // 1. Render Primary Offer
        if (siteConfig.primaryOffer.active) {
            stack.innerHTML += `<a href="${siteConfig.primaryOffer.url}" class="btn btn-primary-offer">${siteConfig.primaryOffer.title}</a>`;
        }

        // 2. Render Lead Magnet
        if (siteConfig.leadMagnet.active) {
            stack.innerHTML += `
                <div class="lead-magnet-box">
                    <h4 style="margin-top:0">${siteConfig.leadMagnet.title}</h4>
                    <input type="email" placeholder="Enter your transmission ID (Email)" class="input-mini">
                    <button class="btn" style="width:100%; padding:10px;">Download Now</button>
                </div>`;
        }

        // 3. Render General Links
        siteConfig.links.forEach(link => {
            if (link.active) {
                stack.innerHTML += `<a href="${link.url}" class="btn">${link.title}</a>`;
            }
        });
    </script>
</body>
</html>
