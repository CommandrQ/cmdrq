<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vanguard University</title>
    <style>
        :root { --navy: #0A192F; --gold: #D4AF37; --white: #FFFFFF; }
        body { font-family: sans-serif; background: #F4F4F6; margin: 0; padding: 20px; color: var(--navy); }
        header { display: flex; justify-content: space-between; max-width: 400px; margin: 0 auto 20px auto; }
        header a { color: var(--navy); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { font-family: 'Georgia', serif; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; margin: 15px 0; color: #555; }
        .btn-submit { width: 100%; padding: 15px; background: var(--navy); color: var(--gold); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .disclaimer { font-size: 0.75rem; color: #777; background: #eee; padding: 10px; border-radius: 4px; margin-top: 20px; line-height: 1.3; }
        #error-msg { color: red; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">← Home</a>
        <!-- Logout link removed -->
    </header>

    <div class="form-container">
        <h2>Begin Your Journey</h2>
        <div id="error-msg"></div>
        <form id="signupForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Create Password" required>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <input type="text" id="firstName" placeholder="Legal First Name" required>
            <input type="text" id="lastName" placeholder="Legal Last Name" required>
            <input type="text" id="preferredName" placeholder="Preferred Name (Display Name)" required>
            <input type="number" id="birthYear" placeholder="Legal Birth Year (YYYY)" required min="1900" max="2008">

            <div class="checkbox-group">
                <input type="checkbox" id="ageCheck" required>
                <label for="ageCheck">I confirm I am 18 years of age or older.</label>
            </div>

            <button type="submit" class="btn-submit">Sign Up & Apply</button>

            <div class="disclaimer">
                <strong>Internal Verification:</strong> Your legal data is used only to verify your identity within Vanguard Academy. We never share your information with third parties.
            </div>
        </form>
    </div>

    <script type="module">
        // Import your Supabase client here
        
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error-msg');
            
            // Collect fields
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const first = document.getElementById('firstName').value;
            const last = document.getElementById('lastName').value;
            const preferred = document.getElementById('preferredName').value;
            const birth = document.getElementById('birthYear').value;

            // 18+ Check (Front-end validation)
            if (new Date().getFullYear() - birth < 18) {
                errorDiv.textContent = "You must be 18 or older to apply.";
                return;
            }

            // Supabase Auth Sign Up
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        first_name: first,
                        last_name: last,
                        preferred_name: preferred,
                        birth_year: parseInt(birth)
                    }
                }
            });

            if (error) {
                errorDiv.textContent = error.message;
            } else {
                alert("Application submitted! Please check your email for a verification link.");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
