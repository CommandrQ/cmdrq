<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vanguard University</title>
    <style>
        :root { --navy: #0A192F; --gold: #D4AF37; --white: #FFFFFF; }
        body { font-family: sans-serif; background: #F4F4F6; margin: 0; padding: 20px; color: var(--navy); }
        header { display: flex; justify-content: flex-start; max-width: 400px; margin: 0 auto 20px auto; }
        header a { color: var(--navy); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { font-family: 'Georgia', serif; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        
        .btn-submit { width: 100%; padding: 15px; background: var(--navy); color: var(--gold); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        
        .signin-footer { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
        .signin-footer a { color: var(--navy); font-weight: bold; text-decoration: none; border-bottom: 1px solid var(--gold); }
        
        .disclaimer { font-size: 0.75rem; color: #777; background: #eee; padding: 10px; border-radius: 4px; margin-top: 25px; line-height: 1.3; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">← Back to Campus</a>
    </header>

    <div class="form-container">
        <h2>Begin Your Journey</h2>
        <form id="signupForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Create Password" required>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <input type="text" id="firstName" placeholder="Legal First Name" required>
            <input type="text" id="lastName" placeholder="Legal Last Name" required>
            <input type="text" id="preferredName" placeholder="Preferred Name" required>
            <input type="number" id="birthYear" placeholder="Legal Birth Year (YYYY)" required>

            <button type="submit" class="btn-submit">Sign Up & Apply</button>

            <!-- ADDED SIGN IN LINK -->
            <div class="signin-footer">
                Already a Citizen? <a href="login.html">Sign In</a>
            </div>

            <div class="disclaimer">
                <strong>Internal Verification:</strong> Your data is used for internal identity verification. We do not share your information with third parties.
            </div>
        </form>
    </div>

</body>
</html>
