<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSUBI | Tactical HUD</title>
    <link rel="stylesheet" href="css/menu.css?v=2">
</head>
<body>
    <div class="scanlines"></div>

    <div class="hud-wrapper">
        <header class="hud-header glass">
            <div class="status-indicator">
                <span class="pulse-dot"></span> SYSTEM: <span class="cyan-text">ONLINE</span>
            </div>
            <div class="time-readout" id="clock">00:00:00</div>
        </header>

        <main class="tactical-layout">
            
            <section class="node-matrix glass" id="node-matrix">
                </section>

            <aside class="intel-panel glass">
                <div class="panel-header">NODE_INTEL_STREAM</div>
                
                <div id="intel-display" class="intel-content">
                    <p class="blink-text">> AWAITING NODE SELECTION...</p>
                </div>
                
                <div class="panel-footer">
                    <button id="nav-action" class="nav-btn locked" disabled>NO_TARGET</button>
                </div>
            </aside>
            
        </main>
    </div>

    <script src="js/menu.js?v=2"></script>
</body>
</html>
