<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vanguard_OS // Initialization</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        /* --- STAGE 1: PRESS START STYLES --- */
        #start-screen {
            position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1s;
        }

        .start-btn {
            background: transparent; border: none; cursor: pointer;
            position: relative; padding: 20px 60px;
            font-family: var(--title-font); font-size: 2.5rem;
            color: var(--bright-teal); text-transform: uppercase; letter-spacing: 10px;
        }

        /* Slicing Animation */
        .slice-top, .slice-bottom {
            position: absolute; left: 0; width: 100%; height: 50%;
            overflow: hidden; transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1);
            pointer-events: none;
        }
        .slice-top { top: 0; border-top: 2px solid var(--bright-teal); }
        .slice-bottom { bottom: 0; border-bottom: 2px solid var(--bright-teal); }

        .start-btn.sliced .slice-top { transform: translateX(100%); }
        .start-btn.sliced .slice-bottom { transform: translateX(-100%); }
        .start-btn.sliced span { opacity: 0; }

        /* --- STAGE 2: TERMINAL LOADER STYLES --- */
        #terminal-screen {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; background: #000; color: var(--bright-teal);
            font-family: monospace; text-transform: uppercase;
        }

        .terminal-window {
            width: 90%; max-width: 600px;
            padding: 40px; border-radius: 20px;
            background: rgba(0, 20, 0, 0.2);
            border: 1px solid rgba(1, 205, 254, 0.3);
            box-shadow: 0 0 50px rgba(1, 205, 254, 0.1);
            position: relative; overflow: hidden;
        }

        #log-output { font-size: 0.7rem; line-height: 1.6; margin-bottom: 20px; color: var(--gold); }
        
        .loader-bar-container {
            width: 100%; height: 10px; background: rgba(255, 255, 255, 0.1);
            border-radius: 5px; overflow: hidden; position: relative;
        }
        #loader-fill {
            width: 0%; height: 100%; background: var(--bright-teal);
            box-shadow: 0 0 15px var(--bright-teal); transition: width 0.1s;
        }

        .crt-flicker { animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.9; } }
    </style>
</head>
<body class="crt-overlay">
    <canvas id="starfield-canvas"></canvas>

    <div id="start-screen">
        <button class="start-btn" id="start-trigger">
            <span>PRESS START</span>
            <div class="slice-top"></div>
            <div class="slice-bottom"></div>
        </button>
        <p style="color: var(--gold); margin-top: 20px; letter-spacing: 5px; font-family: monospace; font-size: 0.6rem;">FOUND_PERSONAL_STUDY_LINK</p>
    </div>

    <div id="terminal-screen" class="vanguard-page">
        <div class="terminal-window crt-flicker">
            <div id="log-output"></div>
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
                <span>OS_BOOT_SEQUENCE</span>
                <span id="load-percent">0%</span>
            </div>
            <div class="loader-bar-container">
                <div id="loader-fill"></div>
            </div>
        </div>
    </div>

    <script src="js/warp.js"></script>
    <script>
        const trigger = document.getElementById('start-trigger');
        const startScreen = document.getElementById('start-screen');
        const termScreen = document.getElementById('terminal-screen');
        const logOutput = document.getElementById('log-output');
        const loadFill = document.getElementById('loader-fill');
        const loadText = document.getElementById('load-percent');

        const bootLogs = [
            "> INITIALIZING VANGUARD_REMOTE_UPLINK...",
            "> MOUNTING SECTOR_01_PORTFOLIO...",
            "> DECRYPTING CMDR_Q_ARCHIVE...",
            "> LOADING RPG_ENGINE_CORE...",
            "> ESTABLISHING NEURAL_LINK...",
            "> UPLINK SECURE. WELCOME COMMANDER."
        ];

        trigger.addEventListener('click', () => {
            // Slicing Animation
            trigger.classList.add('sliced');
            
            setTimeout(() => {
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    beginTerminalBoot();
                }, 1000);
            }, 600);
        });

        function beginTerminalBoot() {
            termScreen.style.display = 'flex';
            let logIndex = 0;
            let progress = 0;

            // Log sequence
            const logInterval = setInterval(() => {
                if (logIndex < bootLogs.length) {
                    const line = document.createElement('div');
                    line.innerText = bootLogs[logIndex];
                    logOutput.appendChild(line);
                    logIndex++;
                }
            }, 600);

            // Loader sequence
            const loadInterval = setInterval(() => {
                if (progress < 100) {
                    progress += Math.floor(Math.random() * 3) + 1;
                    if (progress > 100) progress = 100;
                    loadFill.style.width = `${progress}%`;
                    loadText.innerText = `${progress}%`;
                } else {
                    clearInterval(loadInterval);
                    clearInterval(logInterval);
                    setTimeout(() => {
                        window.location.href = 'menu.html';
                    }, 1000);
                }
            }, 50);
        }
    </script>
</body>
</html>
