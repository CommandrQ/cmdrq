<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSUBI | Tactical HUD</title>
    <link rel="stylesheet" href="css/menu.css?v=99">
</head>
<body class="action-mode">
    
    <div class="stars"></div>
    <div id="matrix-lines"></div>
    <div class="scanlines"></div>

    <div class="hud-wrapper">

        <main class="tactical-layout">
            <section class="node-matrix" id="node-matrix">
                </section>
        </main>
    </div>
