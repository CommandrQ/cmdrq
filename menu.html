<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Vanguard_OS | Dashboard</title>
</head>
<body class="dashboard">
    <div class="terminal-overlay"></div>

    <nav class="status-bar">
        <div class="user-info">OPERATOR: <span class="highlight">ID_772-B</span></div>
        <div class="system-clock" id="clock">00:00:00</div>
        <div class="network-status">LINK: <span class="stable">STABLE</span></div>
    </nav>

    <main class="hud-container">
        <section class="app-grid">
            <div class="app-tile" onclick="location.href='apps/archive.html'">
                <div class="icon-box"><img src="images/icons/archive.svg" alt=""></div>
                <label>ARCHIVE</label>
            </div>
            <div class="app-tile" onclick="location.href='apps/map.html'">
                <div class="icon-box"><img src="images/icons/map.svg" alt=""></div>
                <label>MAP_VIEWER</label>
            </div>
            <div class="app-tile" onclick="location.href='apps/comms.html'">
                <div class="icon-box"><img src="images/icons/comms.svg" alt=""></div>
                <label>COMMS</label>
            </div>
            <div class="app-tile locked">
                <div class="icon-box">🔒</div>
                <label>ENCRYPTED</label>
            </div>
        </section>

        <aside class="side-panel">
            <h3>SYSTEM_LOGS</h3>
            <div class="stat-row">CPU: <span>42%</span></div>
            <div class="stat-row">MEM: <span>1.2TB/4.0TB</span></div>
            <div class="mini-graph"></div>
        </aside>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
