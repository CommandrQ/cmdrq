<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD_OS // PRESS START</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="arcade-start">

    <div id="starfield"></div>
    <div class="crt-overlay"></div>
    <div class="fade-overlay" id="fade-overlay"></div>

    <main class="centered-container">
        <div class="top-meta">
            <span>CREDIT 01</span>
            <span>V_OS NODE_07</span>
        </div>

        <header class="logo-area">
            <h1 class="capcom-title" data-text="VANGUARD">VANGUARD</h1>
            <h2 class="sub-title">CITIZEN OPERATOR LINK</h2>
        </header>

        <div class="action-zone">
            <button id="slice-button" class="start-btn" onclick="initiateFullDive()">
                <span class="slice top" data-text="PRESS START">PRESS START</span>
                <span class="slice bottom" data-text="PRESS START">PRESS START</span>
            </button>
            <p class="blink-hint">INSERT COIN TO CONTINUE</p>
        </div>

        <footer class="bottom-meta">
            <p>© 199X-2026 VANGUARD CORPORATION. ALL RIGHTS RESERVED.</p>
        </footer>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
