<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMANDER Q | The Hideout</title>
    <style>
        :root {
            --neon-purple: #bf5af2;
            --neon-blue: #5ac8fa;
            --glass-bg: rgba(20, 20, 35, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- BACKGROUND LAYER --- */
        #star-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- MAIN UI --- */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .splash-container {
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(191, 90, 242, 0.15) 0%, transparent 70%);
        }

        .commander-img {
            width: 100%;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- BUTTON SLICE LOGIC --- */
        .btn-wrapper {
            position: relative;
            margin-top: 40px;
            cursor: pointer;
        }

        .enter-btn {
            padding: 18px 50px;
            background: var(--glass-bg);
            border: 1px solid var(--neon-purple);
            color: white;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            position: relative;
            display: block;
        }

        /* Slice State */
        .btn-wrapper.sliced .enter-btn {
            opacity: 0;
            pointer-events: none;
        }

        .slice-part {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--neon-purple);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 6px;
            pointer-events: none;
            opacity: 0;
        }

        .btn-wrapper.sliced .slice-part {
            opacity: 1;
        }

        .part-top {
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 55%);
            animation: sliceTop 0.8s forwards ease-out;
        }

        .part-bottom {
            clip-path: polygon(0 55%, 100% 45%, 100% 100%, 0 100%);
            animation: sliceBottom 0.8s forwards ease-out;
        }

        @keyframes sliceTop {
            to { transform: translate(-20px, -40px) rotate(-5deg); opacity: 0; }
        }

        @keyframes sliceBottom {
            to { transform: translate(20px, 40px) rotate(5deg); opacity: 0; }
        }

        /* --- FULL SCREEN OVERLAY --- */
        #transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: white;
            opacity: 0;
            pointer-events: none;
        }

        .screen-cut {
            animation: screenFadeOut 1s forwards ease-in;
        }

        @keyframes screenFadeOut {
            0% { opacity: 0; }
            10% { opacity: 1; background: white; } /* Initial Flash */
            30% { background: black; clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
            100% { opacity: 1; background: black; clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%); }
        }

    </style>
</head>
<body>

    <div id="star-container"></div>
    <div id="transition-overlay"></div>

    <div id="main-content">
        <div class="splash-container">
            <img src="images/commanderqhs.png" alt="Commander Q" class="commander-img">
        </div>
        
        <h1 style="color: white; letter-spacing: 10px; font-weight: 200; margin-bottom: 0;">COMMANDER Q</h1>
        <p style="color: var(--neon-blue); letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 20px;">VANGUARD COMMANDER // SECTOR 01</p>

        <div class="btn-wrapper" id="target-btn" onclick="executeSlice()">
            <div class="enter-btn">>Enter The Hideout<</div>
            <!-- These only show during the click -->
            <div class="slice-part part-top">>Enter The Hideout<</div>
            <div class="slice-part part-bottom">>Enter The Hideout<</div>
        </div>
    </div>

    <script>
        // Starfield Init
        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starContainer.appendChild(star);
        }

        function executeSlice() {
            // Trigger Button Animation
            document.getElementById('target-btn').classList.add('sliced');
            
            // Trigger Screen Transition
            const overlay = document.getElementById('transition-overlay');
            overlay.classList.add('screen-cut');
            
            setTimeout(() => {
                window.location.href = 'hud.html'; 
            }, 1000);
        }
    </script>
</body>
</html>
