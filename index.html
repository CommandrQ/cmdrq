<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vanguard_OS // Initialization</title>
    
    <link rel="stylesheet" href="css/global.css">
    
    <style>
        /* =========================================================
           LOCAL CINEMATIC INTRO LOGIC (Overrides & Additions)
           ========================================================= */
        
        /* Forces the central alignment needed for the "monitor" */
        .vanguard-page {
            justify-content: center !important;
            align-items: center !important;
            padding-top: 0 !important; /* Ignore taskbar clearance for the intro */
        }

        /* The main container for the "video feed" */
        .intro-viewport {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px; /* Cinematic aspect ratio constraint */
            animation: monitorPowerOn 1.5s ease-out both;
        }

        /* Layer 1: The "CRT Monitor" frame */
        .monitor-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Matches global video glass standard */
            background: #000;
            border-radius: 20px;
            border: 4px solid #111; /* Simulates monitor bezel */
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.8), /* Soft shadow */
                inset 0 0 20px rgba(1, 205, 254, 0.2); /* Internal glow */
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* The Image Visual (images/intro.png) */
        .monitor-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Simulates slight color fringing of old video */
            filter: contrast(1.1) saturate(1.2);
            animation: chromaJitter 10s infinite;
        }

        /* LAYER 1b: The Scanline Overlay (Video simulation) */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.08) 50%
            );
            background-size: 100% 4px; /* Size of the lines */
            pointer-events: none; /* Allows clicking through */
            z-index: 5;
        }

        /* Layer 2: Interactive Press Start Elements */
        .press-start-container {
            text-align: center;
            font-family: var(--title-font, monospace);
        }

        .system-title {
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 5px;
            margin-bottom: 5px;
            opacity: 0.6;
        }

        /* Augmented .back-btn for "Press Start" feel */
        .press-start-btn {
            display: inline-block;
            font-size: 1.5rem;
            color: var(--light-pink);
            text-decoration: none;
            border: 3px solid var(--light-pink);
            padding: 15px 50px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            letter-spacing: 5px;
            transition: all 0.2s ease;
            cursor: pointer;
            
            /* The classic flashing animation */
            animation: textFlicker 1.5s infinite step-end;
        }

        .press-start-btn:hover {
            color: var(--void-black);
            background: var(--light-pink);
            box-shadow: 0 0 30px var(--light-pink);
            transform: scale(1.05);
            letter-spacing: 8px; /* Increases kinetic spread */
            animation: none; /* Stops flicker on hover */
        }

        /* ANIMATION KEYFRAMES */

        /* Monitors flickering on */
        @keyframes monitorPowerOn {
            0% { opacity: 0; transform: scale(0.1, 0.001); filter: brightness(10) blur(10px); }
            40% { opacity: 1; transform: scale(1, 0.01); filter: brightness(10) blur(0); }
            100% { opacity: 1; transform: scale(1, 1); filter: brightness(1); }
        }

        /* Classic step-flicker for Press Start */
        @keyframes textFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }

        /* Subtle RGB shift jitter to make static image feel like a live video feed */
        @keyframes chromaJitter {
            0%, 100% { transform: translate(0, 0); }
            1% { transform: translate(-1px, 1px) scale(1.001); filter: hue-rotate(2deg); }
            2% { transform: translate(1px, -1px); filter: hue-rotate(-2deg); }
            3% { transform: translate(0, 0); filter: hue-rotate(0); }
        }

    </style>
</head>
<body>
    
    <canvas id="starfield-canvas"></canvas>

    <div class="vanguard-page">
        
        <main class="intro-viewport">
            
            <div class="monitor-frame">
                <img src="images/intro.png" alt="OS Boot Sequence">
                <div class="scanlines"></div>
            </div>

            <div class="press-start-container">
                <div class="system-title">VANGUARD_OS // INITIALIZATION</div>
                <a href="menu.html" class="press-start-btn">PRESS START</a>
            </div>

        </main>

    </div>

    <script src="js/warp.js"></script>
    <script src="js/footer.js"></script>

</body>
</html>
