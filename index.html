<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vanguard_OS // Init</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <canvas id="starfield-canvas"></canvas>

    <div class="vanguard-page" style="justify-content: center; align-items: center;">
        <h1 style="font-family: var(--title-font); font-size: 4rem; letter-spacing: 15px;">VANGUARD</h1>
        <a href="home.html" class="back-btn" style="font-size: 1.5rem; padding: 20px 60px; border-radius: 50px;">INITIALIZE</a>
    </div>

    <script>
        const canvas = document.getElementById('starfield-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 600;
        const speed = 5;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    o: Math.random()
                });
            }
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width / 2, canvas.height / 2);

            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                // Math for Layer 0: $x' = x/z, y' = y/z$
                let x = s.x / (s.z / canvas.width);
                let y = s.y / (s.z / canvas.width);
                let size = (1 - s.z / canvas.width) * 3;

                ctx.fillStyle = `white`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                s.z -= speed;
                if (s.z <= 0) s.z = canvas.width;
            }
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
