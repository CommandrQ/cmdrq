<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMANDER Q | The Hideout</title>
    <style>
        :root {
            --neon-purple: #bf5af2;
            --neon-blue: #5ac8fa;
            --glass-bg: rgba(20, 20, 35, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Constant background for the whole experience */
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Starfield Layer - Visible from second one */
        #star-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Intro Sequence Layer - Transparent background */
        #intro-sequence {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent; /* No black overlay */
            pointer-events: none;
        }

        .frame {
            position: absolute;
            width: 80%; /* Slightly smaller to feel like a window in the stars */
            height: 60%;
            opacity: 0;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(90, 200, 250, 0.2);
            border-radius: 4px;
        }

        #frame-1 { animation: frameSequence 2s forwards 0.5s; background-image: url('images/frame1.jpg'); }
        #frame-2 { animation: frameSequence 2s forwards 2.5s; background-image: url('images/frame2.jpg'); }
        #frame-3 { animation: frameSequence 2s forwards 4.5s; background-image: url('images/frame3.jpg'); }

        @keyframes frameSequence {
            0% { opacity: 0; transform: scale(0.95); filter: brightness(0.5) blur(5px); }
            20% { opacity: 1; filter: brightness(1) blur(0px); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        /* Main Content reveal */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: revealContent 1.5s forwards 6.5s;
        }

        @keyframes revealContent { to { opacity: 1; } }

        .splash-container {
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(191, 90, 242, 0.2) 0%, transparent 70%);
        }

        .commander-img {
            width: 90%;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Transition FX: The Slice */
        #transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: white;
            opacity: 0;
            pointer-events: none;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
        }

        .slicing {
            animation: flashAndSlice 1.2s forwards ease-in;
        }

        @keyframes flashAndSlice {
            0% { opacity: 0; clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
            10% { opacity: 1; }
            30% { background: black; }
            100% { opacity: 1; background: black; clip-path: polygon(0 100%, 100% 0, 100% 100%, 0% 100%); }
        }

        .enter-btn {
            margin-top: 30px;
            padding: 15px 45px;
            background: rgba(20, 20, 35, 0.5);
            border: 1px solid var(--neon-purple);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .enter-btn:hover {
            box-shadow: 0 0 20px var(--neon-purple);
            background: rgba(191, 90, 242, 0.2);
        }
    </style>
</head>
<body>

    <!-- Stars and sky are now visible immediately -->
    <div id="star-container"></div>
    <div id="transition-overlay"></div>

    <!-- Frames now appear over the star background -->
    <div id="intro-sequence">
        <div class="frame" id="frame-1"></div>
        <div class="frame" id="frame-2"></div>
        <div class="frame" id="frame-3"></div>
    </div>

    <div id="main-content">
        <div class="splash-container">
            <img src="images/commanderqhs.png" alt="Commander Q" class="commander-img">
        </div>
        <h1 style="color: white; letter-spacing: 8px; font-weight: 200;">COMMANDER Q</h1>
        <button class="enter-btn" onclick="initiateExit()">>Enter The Hideout<</button>
    </div>

    <script>
        // Starfield Generation
        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starContainer.appendChild(star);
        }

        function initiateExit() {
            const overlay = document.getElementById('transition-overlay');
            overlay.classList.add('slicing');
            setTimeout(() => {
                window.location.href = 'hud.html'; 
            }, 1100);
        }
    </script>
</body>
</html>
