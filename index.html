<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander Q | The Hideout</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Animated Starfield Background -->
    <div id="starfield"></div>
    <div class="gradient-overlay"></div>

    <!-- Intro Section -->
    <section id="landing">
        <div class="intro-container">
            <img src="images/commanderqhs.png" alt="Commander Q" class="float-animation">
            <button id="enter-btn" onclick="revealMenu()">Enter the hideout</button>
        </div>
    </section>

    <!-- Navigation Section -->
    <section id="main-nav" class="hidden">
        <nav id="menu-grid">
            <!-- Links injected via JS -->
        </nav>
    </section>

    <script src="app.js"></script>
</body>
</html>
