<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Terminal Login</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="boot-sequence">

    <div class="terminal-overlay"></div>

    <main class="login-container">
        <header class="os-header">
            <h1 class="glitch" data-text="VANGUARD_OS">VANGUARD_OS</h1>
            <p class="system-status">NEURAL_LINK_STATUS: <span class="highlight">WAITING...</span></p>
        </header>

        <section class="terminal-window">
            <div id="terminal-output">
                </div>
        </section>

        <section class="auth-box" id="login-module" style="opacity: 0; transition: opacity 1s ease-in;">
            <div class="scan-line"></div>
            
            <div class="input-container">
                <span class="prompt">ACCESS_KEY:</span>
                <input type="password" id="access-key" placeholder="********" autocomplete="off">
            </div>

            <div class="action-bar">
                <button class="btn-initialize" onclick="authorizeUser()">
                    INITIALIZE LINK
                </button>
            </div>
            
            <div class="security-warning">
                <small>WARNING: SECURE LINE ENFORCED BY VANGUARD_CORE</small>
            </div>
        </section>
    </main>

    <footer class="os-metadata">
        <div class="meta-item">NODE: <span class="highlight">0x772B</span></div>
        <div class="meta-item">ENCRYPTION: <span class="highlight">RSA-4096</span></div>
        <div class="meta-item">LOC: <span class="highlight">KY_US_RADCLIFF</span></div>
    </footer>

    <script src="js/main.js"></script>

    <script>
        /**
         * UX Enhancement: 
         * Automatically focuses the password input so the user 
         * doesn't have to click it after the boot sequence.
         */
        document.addEventListener('keydown', () => {
            const input = document.getElementById('access-key');
            if (input && document.activeElement !== input) {
                input.focus();
            }
        });
    </script>

</body>
</html>
