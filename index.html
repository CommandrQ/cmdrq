<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSUBI | Tactical HUD - About</title>
    <style>
        :root {
            --cyan: #00f3ff;
            --purple: #bc13fe;
            --dark-bg: #050505;
            --glass: rgba(0, 243, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor handled by JS */
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        /* --- BACKGROUND ELEMENTS --- */
        .purple-radial-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -3;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
            opacity: 0.3;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- HUD WRAPPER --- */
        .hud-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 5;
            border: 1px solid rgba(0, 243, 255, 0.1);
            margin: 10px;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--cyan);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .cyan-text { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        
        .flicker-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--cyan);
            border-radius: 50%;
            margin-right: 10px;
            animation: flicker 1.5s infinite;
        }

        /* --- MAIN LAYOUT --- */
        .tactical-layout {
            display: flex;
            flex: 1;
            justify-content: space-between;
            align-items: center;
        }

        .node-matrix {
            width: 250px;
            font-size: 10px;
            color: var(--cyan);
            opacity: 0.7;
            line-height: 1.5;
        }

        .avatar-central-node {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-frame {
            width: 200px;
            height: 200px;
            border: 2px solid var(--purple);
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 0 20px var(--purple);
            position: relative;
            animation: pulse 4s infinite ease-in-out;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.2) brightness(0.8);
        }

        /* --- BUTTONS & NAV --- */
        .return-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .return-btn:hover {
            background: var(--cyan);
            color: black;
            box-shadow: 0 0 20px var(--cyan);
        }

        /* --- FOOTER --- */
        .hud-footer {
            border-top: 1px solid var(--purple);
            padding-top: 10px;
            display: flex;
            justify-content: center;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .footer-text-container span {
            margin: 0 15px;
            animation: textGlitch 5s infinite;
        }

        /* --- CURSOR --- */
        .musubi-cursor-dot {
            width: 20px;
            height: 20px;
            border: 1px solid var(--cyan);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* --- ANIMATIONS --- */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--purple); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px var(--purple); }
        }

        @keyframes textGlitch {
            0% { opacity: 1; transform: skew(0deg); }
            2% { opacity: 0.8; transform: skew(10deg); }
            4% { opacity: 1; transform: skew(0deg); }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="action-mode">
    
    <div class="purple-radial-glow"></div>
    <canvas id="matrix-canvas"></canvas>
    <div class="scanlines"></div>

    <div class="hud-wrapper">
        <header class="hud-header">
            <div class="status-indicator">
                <span class="flicker-dot"></span> SYSTEM_STATUS: <span class="cyan-text">ACTIVE</span>
            </div>
            <div class="time-readout" id="clock">00:00:00</div>
        </header>

        <main class="tactical-layout">
            <section class="node-matrix" id="node-matrix-left">
                [DATA_STREAM_A]<br>
                > ENCRYPTING...<br>
                > BYPASSING...<br>
                > STACK_OVERFLOW: NULL<br>
                > ORIGIN: SECTOR_7<br>
                > LATENCY: 14ms
            </section>

            <div class="avatar-central-node">
                <div class="avatar-frame">
                    <img src="images/commanderqhs.png" alt="Commander QHS" class="avatar-img" onerror="this.src='https://via.placeholder.com/200/bc13fe/ffffff?text=QHS'">
                </div>
                <a href="menu.html" class="return-btn">Return to Menu</a>
            </div>

            <section class="node-matrix" id="node-matrix-right" style="text-align: right;">
                [USER_PROFILE]<br>
                RANK: COMMANDER<br>
                CLEARANCE: LEVEL_01<br>
                BIO: ENCRYPTED<br>
                LOCATION: UNKNOWN<br>
                STATUS: ONLINE
            </section>
        </main>

        <footer class="hud-footer">
            <div class="footer-text-container">
                <span class="footer-text msg-1">BUILT BY COMMANDER Q.</span>
                <span class="footer-text msg-2">EMPOWER. EDUCATE. ELEVATE.</span>
            </div>
        </footer>
    </div>

    <div class="musubi-cursor-dot" id="cursor"></div>

    <script>
        // --- LIVE CLOCK ---
        function updateClock() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                               now.getMinutes().toString().padStart(2, '0') + ":" + 
                               now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#bc13fe"; // Purple matrix
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- CUSTOM CURSOR ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
