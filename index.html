<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMANDER Q | The Hideout</title>
    <style>
        :root {
            --neon-purple: #bf5af2;
            --neon-blue: #5ac8fa;
            --glass-bg: rgba(20, 20, 35, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- BACKGROUND LAYER: Starfield --- */
        #star-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: transparent;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- CINEMATIC INTRO LAYER --- */
        #intro-sequence {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* Start black for the first frame */
            animation: fadeToSky 2s forwards 6s; /* Fade to transparent to show stars */
        }

        .frame {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            background-size: cover;
            background-position: center;
        }

        /* Frame 1: The Distance */
        #frame-1 { animation: frameSequence 2s forwards 0s; }
        /* Frame 2: The Horizon */
        #frame-2 { animation: frameSequence 2s forwards 2s; }
        /* Frame 3: The Hero */
        #frame-3 { animation: frameSequence 2s forwards 4s; }

        @keyframes frameSequence {
            0% { opacity: 0; transform: scale(1.1); filter: blur(10px); }
            20% { opacity: 1; filter: blur(0px); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; }
        }

        /* Placeholder colors for frames (Replace with your actual image paths) */
        #frame-1 { background: url('images/hero_far.jpg') center/cover; }
        #frame-2 { background: url('images/hero_hill.jpg') center/cover; }
        #frame-3 { background: url('images/hero_close.jpg') center/cover; }

        /* --- SPLASH IMAGE & HUD --- */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: revealContent 1s forwards 6.5s;
        }

        .splash-container {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .commander-img {
            width: 90%;
            height: auto;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes revealContent {
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeToSky {
            to { background: transparent; pointer-events: none; }
        }

        .enter-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: var(--glass-bg);
            border: 1px solid var(--neon-blue);
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(90, 200, 250, 0.3);
        }

        .enter-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }
    </style>
</head>
<body>

    <!-- Starfield Background -->
    <div id="star-container"></div>

    <!-- Intro Cinematic -->
    <div id="intro-sequence">
        <div class="frame" id="frame-1" style="background-image: url('images/frame1.jpg');"></div>
        <div class="frame" id="frame-2" style="background-image: url('images/frame2.jpg');"></div>
        <div class="frame" id="frame-3" style="background-image: url('images/frame3.jpg');"></div>
    </div>

    <!-- Main Landing / Splash -->
    <div id="main-content">
        <div class="splash-container">
            <img src="images/commanderqhs.png" alt="Commander Q" class="commander-img">
        </div>
        <h1 style="color: white; letter-spacing: 5px; margin-top: 20px; font-weight: 200;">COMMANDER Q</h1>
        <button class="enter-btn" onclick="window.location.href='hud.html'">Access Hideout</button>
    </div>

    <script>
        // Generate Starfield
        const starContainer = document.getElementById('star-container');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starContainer.appendChild(star);
        }
    </script>
</body>
</html>
