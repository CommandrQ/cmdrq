<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander Q | The Hideout</title>
    <style>
        :root {
            --light-purple: #e0c3fc;
            --light-blue: #8ecae6;
            --deep-space: #0f0c29;
            --glass-bg: rgba(15, 15, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #2b1055 70%, #7597de 100%);
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Animated Starfield --- */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .stars {
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 15vw 25vh #fff, 35vw 45vh #fff, 70vw 15vh #fff, 85vw 85vh #fff, 
                        25vw 95vh #fff, 55vw 55vh #fff, 80vw 35vh #fff, 10vw 15vh #fff,
                        45vw 10vh #fff, 60vw 80vh #fff, 95vw 30vh #fff, 5vw 70vh #fff;
            animation: moveStars 120s linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* --- Overlay for Fade to Black --- */
        #fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }

        #fade-overlay.active {
            opacity: 1;
        }

        /* --- Main Content --- */
        #landing {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            padding: 20px;
        }

        .commander-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: bold;
            background: linear-gradient(to right, #8ecae6 20%, #fff 40%, #fff 60%, #8ecae6 80%);
            background-size: 200% auto;
            color: #8ecae6;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sheen 3s linear infinite;
        }

        @keyframes sheen {
            to { background-position: 200% center; }
        }

        .commander-img {
            width: 250px;
            max-width: 70vw;
            height: auto;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(142, 202, 230, 0.4));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- Dark Glass Split Button --- */
        .btn-container {
            position: relative;
            width: 280px;
            height: 60px;
            cursor: pointer;
        }

        .btn-part {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%; /* Half height */
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
            border: 1px solid var(--glass-border);
        }

        .btn-top {
            top: 0;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            align-items: flex-end;
        }

        .btn-bottom {
            bottom: 0;
            border-top: none;
            border-radius: 0 0 12px 12px;
            align-items: flex-start;
        }

        /* The text is mirrored in both halves to create the illusion */
        .btn-text {
            height: 60px;
            line-height: 60px;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--light-blue);
            font-weight: bold;
            position: absolute;
        }

        .btn-top .btn-text { top: 0; }
        .btn-bottom .btn-text { bottom: 0; }

        /* Split Animation Classes */
        .splitting .btn-top {
            transform: translateY(-100vh);
        }
        .splitting .btn-bottom {
            transform: translateY(100vh);
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <div id="starfield">
        <div class="stars"></div>
    </div>

    <section id="landing">
        <h1 class="commander-title">Commander Q</h1>
        <img src="images/commanderqhs.png" alt="Commander Q" class="commander-img">
        
        <div class="btn-container" onclick="initiateSequence()">
            <div class="btn-part btn-top">
                <div class="btn-text">Enter the hideout</div>
            </div>
            <div class="btn-part btn-bottom">
                <div class="btn-text">Enter the hideout</div>
            </div>
        </div>
    </section>

    <script>
        function initiateSequence() {
            const container = document.querySelector('.btn-container');
            const overlay = document.getElementById('fade-overlay');

            // Trigger the horizontal split animation
            container.classList.add('splitting');

            // Wait a moment for the split to start, then fade to black
            setTimeout(() => {
                overlay.classList.add('active');
            }, 300);

            // Navigate to hub.html after the animations complete
            setTimeout(() => {
                window.location.href = 'hub.html';
            }, 1100);
        }
    </script>
</body>
</html>
