<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VANGUARD_OS | PRESS START</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body class="arcade-boot">

    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <main class="attract-mode">
        <div class="top-meta">
            <span>CREDIT 00</span>
            <span class="location">SERVER: KY_NODE_07</span>
        </div>

        <div class="logo-area">
            <h1 class="capcom-title">VANGUARD</h1>
            <h2 class="sub-title">CITIZEN OPERATOR LINK</h2>
        </div>

        <section class="dialog-box">
            <div id="terminal-output" class="pixel-text">
                </div>
        </section>

        <section class="auth-module" id="login-module" style="display: none;">
            <div class="input-frame">
                <label>ID_ENTRY:</label>
                <input type="text" id="access-key" maxlength="12" placeholder="CITIZEN_NAME">
            </div>
            
            <div class="flash-prompt" onclick="authorizeUser()">
                [ PRESS START / CLICK TO LINK ]
            </div>
        </section>
    </main>

    <footer class="bottom-bar">
        <div class="scroll-text">THE WORLD IS A STAGE. SELECT YOUR REALITY. VANGUARD_CORP (C) 199X-2026</div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
