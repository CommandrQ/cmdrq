<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Journal Archive</title>
    <link rel="stylesheet" href="../vanguard-os.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --color-gold: #D4AF37; --color-gold-glow: rgba(212, 175, 55, 0.3); }
        
        .journal-container { position: relative; z-index: 100; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }

        /* HEADER & NAVIGATION */
        .hero-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        
        .hub-return-top { 
            margin-top: -15px; font-size: 0.8rem; letter-spacing: 3px; padding: 12px 35px; 
            border-radius: 50px; text-decoration: none; font-weight: bold;
            background: #000; /* Solid Back */
            border: 2px solid var(--color-purple); color: var(--color-purple);
            transition: 0.3s;
        }
        .hub-return-top:hover { background: var(--color-purple); color: #fff; box-shadow: 0 0 20px var(--color-purple); }

        /* GRID */
        .log-deck { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-height: 70vh; overflow-y: auto; padding: 20px; }

        .log-entry-card {
            background: #0a0a15; border: 1px solid var(--window-border); border-radius: 12px;
            padding: 30px; cursor: pointer; text-align: center; transition: 0.4s;
        }
        .log-entry-card:hover { border-color: var(--color-gold); transform: translateY(-5px); box-shadow: 0 10px 20px var(--color-gold-glow); }
        .log-entry-card h3 { color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; margin: 0; pointer-events: none; }

        /* MODALS */
        .gold-modal { text-align: center !important; border: 1px solid var(--color-gold) !important; background: #050505; color: #fff; }
        .modal-title { color: var(--color-gold) !important; text-transform: uppercase; letter-spacing: 3px; display: block; width: 100%; margin-bottom: 20px; }
        
        .modal-actions { display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        
        /* SOLID SECONDARY BUTTONS */
        .btn-solid-secondary {
            background: #1a1a1a !important; /* Solid Black/Grey */
            border: 1px solid #444 !important;
            color: #fff !important;
        }

        .journal-modal-body { text-align: left; line-height: 1.8; margin: 20px 0; color: #fff; }
        
        .purple-return-btn { 
            background: var(--color-purple); color: #fff; border: none; padding: 10px 25px; 
            border-radius: 50px; cursor: pointer; text-transform: uppercase; 
            font-size: 0.75rem; font-weight: bold; margin: 0 auto 20px auto; display: block;
        }
        
        .tactical-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--color-gold); color: #fff; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="star-field"></div>

    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Journal Logs</h1>
            <a href="../hud.html" class="hub-return-top">Return to Hub</a>
        </header>
        <main class="app-dashboard journal-container">
            <div class="log-deck" id="log-deck"></div>
        </main>
    </div>

    <!-- MAIN READING MODAL -->
    <div id="blog-modal" class="modal-overlay">
        <div class="modal-window gold-modal" style="max-width: 700px;">
            <h2 id="blog-modal-title" class="modal-title">Log Title</h2>
            <div id="blog-modal-content" class="journal-modal-body"></div>
            <div class="modal-actions">
                <button onclick="VanguardOS.closeModals()" class="modal-btn btn-solid-secondary">Close</button>
                <button onclick="VanguardOS.handleShare()" class="modal-btn btn-solid-secondary">Copy Blog Link</button>
                <button onclick="VanguardOS.handleReplyClick()" class="modal-btn primary" style="background: var(--color-gold); color: #000;">Post Comment</button>
            </div>
        </div>
    </div>

    <!-- Additional modals (Share, Auth, Reply) all now inherit the solid button styles from the global CSS -->

    <footer class="vanguard-footer">Powered by Vanguard Citizen Services</footer>
    
    <script src="../vanguard-os.js"></script>
    <script>
        async function loadJournal() {
            try {
                const response = await fetch('entries.json');
                const entries = await response.json();
                const deck = document.getElementById('log-deck');
                entries.forEach(entry => {
                    const card = document.createElement('div');
                    card.className = 'log-entry-card';
                    card.onclick = () => VanguardOS.openBlogModal(entry.title, entry.content, entry.id);
                    card.innerHTML = `<h3>${entry.title}</h3>`;
                    deck.appendChild(card);
                });
            } catch (e) { console.error("Entries not found.", e); }
        }
        window.addEventListener('DOMContentLoaded', loadJournal);
    </script>
</body>
</html>
