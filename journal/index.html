<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Vanguard_OS | Journal</title>
    <link rel="stylesheet" href="../vanguard-os.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="star-field"></div>
    <div class="interface-wrapper">
        <header class="hero-container">
            <h1 class="hero-text">Journal Logs</h1>
            <a href="../hud.html" class="modal-btn" style="padding: 8px 25px; border-radius: 50px;">Return to Hub</a>
        </header>
        <main class="app-dashboard" style="display: block;">
            <div id="log-deck" class="log-deck"></div>
        </main>
    </div>

    <!-- MODALS -->
    <div id="blog-modal" class="modal-overlay">
        <div class="modal-window gold-modal" style="max-width: 700px;">
            <h2 id="blog-modal-title" class="hero-text" style="font-size: 1.5rem;"></h2>
            <div id="blog-modal-content" style="text-align: left; padding: 20px; max-height: 40vh; overflow-y: auto;"></div>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
                <button onclick="VanguardOS.closeModals()" class="modal-btn">Close</button>
                <button onclick="VanguardOS.handleShare()" class="modal-btn">Copy Link</button>
                <button onclick="VanguardOS.handleReplyClick()" class="modal-btn primary">Post Comment</button>
            </div>
        </div>
    </div>
    <!-- (Other modals like share-confirm, auth, and reply follow same structure) -->

    <script src="../vanguard-os.js"></script>
</body>
</html>
