<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard_OS | Journal Archive</title>
    <link rel="stylesheet" href="../vanguard-os.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-gold: #D4AF37;
            --color-gold-glow: rgba(212, 175, 55, 0.3);
        }

        .journal-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* UNIFORM BUTTON REDESIGN */
        .modal-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: 48px; /* Uniform Height */
            min-width: 160px; /* Uniform Minimum Width */
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
        }

        /* ACTIONS GRID FOR UNIFORMITY */
        .modal-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 30px;
        }

        @media (min-width: 600px) {
            .modal-actions {
                grid-template-columns: repeat(3, 1fr); /* Three across on desktop */
            }
        }

        .gold-action {
            background: var(--color-gold) !important;
            color: #000 !important;
            box-shadow: 0 4px 15px var(--color-gold-glow);
        }

        .gold-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        /* SCROLLABLE LOG DECK */
        .log-deck {
            width: 100%;
            max-height: 550px;
            overflow-y: auto;
            padding: 10px 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-gold) transparent;
        }

        .log-deck::-webkit-scrollbar { width: 4px; }
        .log-deck::-webkit-scrollbar-thumb { background: var(--color-gold); border-radius: 10px; }

        .log-entry-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--window-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s ease;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .log-entry-card:hover {
            border-color: var(--color-gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-3px);
        }

        /* GOLD ACCENTED MODALS */
        .gold-modal { border: 1px solid var(--color-gold) !important; box-shadow: 0 0 30px var(--color-gold-glow) !important; }
        .gold-modal .modal-title { color: #fff !important; border-bottom: 1px solid var(--color-gold); padding-bottom: 10px; margin-bottom: 20px; display: inline-block; }
        .tactical-input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.3); color: white; font-family: var(--font-sys); border-radius: 8px; }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <div class="interface-wrapper">
        <header class="hero-container" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 40px;">
            <h1 class="hero-text">Journal Logs</h1>
            <a href="../hud.html" class="modal-btn secondary" style="min-width: 200px; height: 40px;">Return to Hub</a>
        </header>

        <main class="app-dashboard journal-container">
            <div class="log-deck" id="log-deck"></div>
        </main>
    </div>

    <!-- READ MODAL -->
    <div id="blog-modal" class="modal-overlay">
        <div class="modal-window" style="max-width: 800px; text-align: left;">
            <h2 id="blog-modal-title" class="modal-title" style="margin-bottom: 25px;">Log Title</h2>
            <div id="blog-modal-content" style="max-height: 45vh; overflow-y: auto; line-height: 1.8; color: #fff; padding-right: 10px;"></div>
            
            <!-- UNIFORM BUTTON ARRAY -->
            <div class="modal-actions">
                <button onclick="VanguardOS.closeModals()" class="modal-btn secondary">Close</button>
                <button onclick="VanguardOS.handleShare()" class="modal-btn gold-action">Share Link</button>
                <button onclick="VanguardOS.handleReplyClick()" class="modal-btn gold-action">Write a Reply</button>
            </div>
        </div>
    </div>

    <!-- REPLY WINDOW -->
    <div id="reply-modal" class="modal-overlay">
        <div class="modal-window gold-modal">
            <h2 class="modal-title">Transmit Reply</h2>
            <form onsubmit="VanguardOS.submitReply(event)">
                <textarea id="reply-text" class="tactical-input" placeholder="Compose your response for the Blogreplies table..." required style="min-height: 150px;"></textarea>
                <div class="modal-actions" style="grid-template-columns: 1fr 1fr;">
                    <button type="button" onclick="VanguardOS.closeModals()" class="modal-btn secondary">Abort</button>
                    <button type="submit" class="modal-btn gold-action">Log Reply</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-window gold-modal">
            <h2 class="modal-title">Clearance Required</h2>
            <form onsubmit="VanguardOS.submitAuth(event)">
                <div id="name-group"><input type="text" id="auth-name" class="tactical-input" placeholder="Callsign"></div>
                <input type="email" id="auth-email" class="tactical-input" placeholder="Email" required>
                <input type="password" id="auth-pass" class="tactical-input" placeholder="Access Key" required>
                <button type="submit" id="auth-submit-btn" class="modal-btn gold-action" style="width: 100%;">Register</button>
            </form>
            <p id="auth-toggle-text" style="font-size: 0.8rem; margin-top: 15px; color: var(--color-gold); text-align: center;">
                Existing Citizen? <a href="#" onclick="VanguardOS.toggleAuthMode()" style="color: #fff;">Login</a>
            </p>
        </div>
    </div>

    <footer class="vanguard-footer">Powered by Vanguard Citizen Services</footer>

    <script src="../vanguard-os.js"></script>

    <script>
        const journalEntries = [
            { id: "log_006", title: "The Weight of the Tether", content: `<p>Outgrowing the people I used to run with is a bittersweet realization... Loyalty isn't staying the same forever; it's respecting the potential of the mission.</p>` },
            { id: "log_005", title: "The Shield of Self-Deprecation", content: `<p>The most dangerous lies are the ones we tell ourselves under the guise of being realistic or humble...</p>` },
            { id: "log_004", title: "The War Within", content: `<p>The most difficult rule to follow is often the first one: you must respect yourself...</p>` },
            { id: "log_003", title: "Survival and The Three Respects", content: `<p>Respecting others is often expressed through the quiet dignity of providing for those who depend on us...</p>` },
            { id: "log_002", title: "Stagnation and Character", content: `<p>Character isn't built when you have everything you need. It’s defined when you have nothing...</p>` },
            { id: "log_001", title: "The Trap of External Victories", content: `<p>Success isn't just about changing the world. It’s about making sure you're someone worth being when you finally get there.</p>` }
        ];

        function loadJournal() {
            const deck = document.getElementById('log-deck');
            journalEntries.forEach((entry, index) => {
                const card = document.createElement('div');
                card.className = 'log-entry-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.onclick = () => VanguardOS.openBlogModal(entry.title, entry.content, entry.id);
                card.innerHTML = `<h3>${entry.title}</h3>`;
                deck.appendChild(card);
            });
        }
        window.addEventListener('DOMContentLoaded', loadJournal);
    </script>
</body>
</html>
